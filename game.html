const SOLANA_RPC    = 'https://api.mainnet-beta.solana.com';

const PUMP_DECIMALS = 6;
const POINTS_TO_PUMP= 0.01;

// Set to true to enforce 1 run per wallet (re-enable before launch)
const ONE_RUN_PER_WALLET = false;

async function rpc(method,params=[]){
  try{
    const r=await fetch(SOLANA_RPC,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:1,method,params})});
    return (await r.json()).result;
  }catch(e){return null;}
}
// One run per wallet — flip ONE_RUN_PER_WALLET above to re-enable
function hasRunUsed(addr){return ONE_RUN_PER_WALLET&&!!localStorage.getItem('pumppit_used_'+addr);}
function markRunUsed(addr){if(ONE_RUN_PER_WALLET)localStorage.setItem('pumppit_used_'+addr,'1');}
function hasRunClaimed(addr){return ONE_RUN_PER_WALLET&&!!localStorage.getItem('pumppit_claimed_'+addr);}
function markRunClaimed(addr){if(ONE_RUN_PER_WALLET)localStorage.setItem('pumppit_claimed_'+addr,'1');}

// ── WALLET ────────────────────────────────────────────────────────────────────
let WALLET={
  connected:false,address:null,loading:false,
  solBalance:null,pumpBalance:null,balanceTimer:0,
  claimState:'idle', // idle | loading | success | error
  claimSig:null,claimError:null,claimAmount:0,
};
async function connectWallet(){
  if(WALLET.loading)return;
  if(WALLET.connected){
    try{if(window.solana)await window.solana.disconnect();}catch(e){}
    WALLET={connected:false,address:null,loading:false,solBalance:null,pumpBalance:null,
      balanceTimer:0,claimState:'idle',claimSig:null,claimError:null,claimAmount:0};
    return;
  }
  WALLET.loading=true;
  try{
    if(!window?.solana?.isPhantom){window.open('https://phantom.app/','_blank');WALLET.loading=false;return;}
    const r=await window.solana.connect();
    const pk=r?.publicKey?.toString?.();
    if(!pk){WALLET.loading=false;return;}
    WALLET.address=pk;WALLET.connected=true;
    fetchBalances();
  }catch(e){console.warn('[wallet connect]',e);}
  WALLET.loading=false;
}
async function tryAutoConnect(){
  try{
    if(!window?.solana?.isPhantom)return;
    const r=await window.solana.connect({onlyIfTrusted:true});
    const pk=r?.publicKey?.toString?.();
    if(pk){WALLET.address=pk;WALLET.connected=true;fetchBalances();}
  }catch(e){}
}
async function fetchBalances(){
  if(!WALLET.connected||!WALLET.address)return;
  WALLET.balanceTimer=5;
  const solR=await rpc('getBalance',[WALLET.address,{commitment:'confirmed'}]);
  if(solR)WALLET.solBalance=(solR.value/1e9).toFixed(3);
  if(PUMP_MINT){
    const tokR=await rpc('getTokenAccountsByOwner',[WALLET.address,{mint:PUMP_MINT},{encoding:'jsonParsed',commitment:'confirmed'}]);
    if(tokR&&tokR.value.length>0){
      WALLET.pumpBalance=parseFloat(tokR.value[0].account.data.parsed.info.tokenAmount.uiAmountString||'0');
    }else if(tokR){WALLET.pumpBalance=0;}
  }
}
async function claimRewards(){
  if(WALLET.claimState==='loading')return;
  if(!WALLET.connected){connectWallet();return;}
  WALLET.claimState='loading';
  const pump=Math.floor(G.finalScore*POINTS_TO_PUMP*100)/100;
  WALLET.claimAmount=pump;
  try{
    const msg=`PumpPit Claim\nScore: ${G.finalScore}\nEarned: ${pump} PUMP\nWallet: ${WALLET.address}\nTimestamp: ${Date.now()}`;
    const encoded=new TextEncoder().encode(msg);
    const{signature}=await window.solana.signMessage(encoded,'utf8');
    const sigHex=Array.from(signature).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,20);
    WALLET.claimSig=sigHex+'...';
    WALLET.claimState='success';
    markRunClaimed(WALLET.address);
    fetchBalances();
  }catch(e){
    WALLET.claimState='error';
    WALLET.claimError=(e.message||'User rejected').slice(0,40);
  }
}

}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let AC=null;
function getAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return AC;}
function snd(type){const ac=getAC();if(!ac)return;try{const g=ac.createGain();g.connect(ac.destination);const t=ac.currentTime;
  if(type==='shoot'){const o=ac.createOscillator();o.connect(g);o.type='square';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(90,t+.08);g.gain.setValueAtTime(.05,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);}
  else if(type==='boss'){const o=ac.createOscillator();o.connect(g);o.type='sawtooth';o.frequency.setValueAtTime(90,t);o.frequency.exponentialRampToValueAtTime(35,t+1.8);g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.001,t+1.8);o.start(t);o.stop(t+1.8);}
  else if(type==='levelup'){[523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator(),g2=ac.createGain();o.connect(g2);g2.connect(ac.destination);o.type='sine';o.frequency.value=f;g2.gain.setValueAtTime(.15,t+i*.1);g2.gain.exponentialRampToValueAtTime(.001,t+i*.1+.22);o.start(t+i*.1);o.stop(t+i*.1+.25);});}
  else if(type==='chest'){const o=ac.createOscillator();o.connect(g);o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+.25);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);}
  else if(type==='bossdie'){const o=ac.createOscillator();o.connect(g);o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(40,t+2.2);g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+2.2);o.start(t);o.stop(t+2.2);}
  else if(type==='hit'){const o=ac.createOscillator();o.connect(g);o.type='square';o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(55,t+.06);g.gain.setValueAtTime(.09,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);o.start(t);o.stop(t+.06);}
}catch(e){}}

// ── PIXEL ART ENGINE ──────────────────────────────────────────────────────────
function pxSprite(rows,pal,cx,cy,sc,flipX){
  const h=rows.length,w=rows[0].length,ox=Math.floor(w/2),oy=Math.floor(h/2);
  ctx.save();ctx.translate(cx,cy);if(flipX)ctx.scale(-1,1);
  for(let r=0;r<h;r++)for(let cc=0;cc<w;cc++){const k=rows[r][cc];if(k==='.')continue;const col=pal[k];if(!col)continue;ctx.fillStyle=col;ctx.fillRect((cc-ox)*sc,(r-oy)*sc,sc,sc);}
  ctx.restore();
}

function initBG(){

  pc2.width=sz*cols;pc2.height=sz*rows;const pc=pc2.getContext('2d');
  let seed=42;const sr=()=>{seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/0xffffffff;};
  for(let tx=0;tx<cols;tx++)for(let ty=0;ty<rows;ty++){
    const v=sr(),x=tx*sz,y=ty*sz,base=16+Math.floor(v*10);
    pc.fillStyle=`rgb(${base+4},${base+2},${base})`;pc.fillRect(x,y,sz,sz);
    pc.fillStyle='rgba(255,255,255,0.03)';pc.fillRect(x+1,y+1,sz-2,sz-2);
    pc.fillStyle='rgba(0,0,0,.45)';pc.fillRect(x,y,sz,2);pc.fillRect(x,y,2,sz);
    if(v<.14){pc.strokeStyle='rgba(0,0,0,.4)';pc.lineWidth=0.8;pc.beginPath();const cx=x+sz*.25+sr()*sz*.35,cy2=y+sz*.2+sr()*sz*.25;pc.moveTo(cx,cy2);pc.lineTo(cx+sr()*18-5,cy2+sr()*14-3);pc.stroke();}
    if(v>.86){pc.fillStyle='rgba(18,55,18,.18)';pc.beginPath();pc.ellipse(x+sr()*sz*.4+sz*.2,y+sr()*sz*.4+sz*.2,sr()*9+3,sr()*7+2,sr()*Math.PI,0,Math.PI*2);pc.fill();}
  }
  tilePat=ctx.createPattern(pc2,'repeat');
  menuTorches=[];for(let i=0;i<8;i++)menuTorches.push({x:rand(60,W-60),y:rand(60,H-60)});
}
function genTorches(){
  const t=[],step=320;
  for(let x=step;x<WORLD-step;x+=step)for(let y=step;y<WORLD-step;y+=step)
    if((Math.floor(x/step)+Math.floor(y/step))%2===0)t.push({x:x+(Math.random()-.5)*60,y:y+(Math.random()-.5)*60});
  return t;
}

function nearestEnemy(x,y,rng){let best=null,bd=rng;for(const e of G.enemies){const d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}}return best;}

function damageEnemy(e,dmg,canCrit){

}
function damagePlayer(dmg){
  const p=G.player;if(p.invincible>0)return;
  dmg=Math.floor(dmg*(1-p.armor));
  if(p.shieldHp>0){p.shieldHp--;p.shieldTimer=p.shieldFast?3:5;addFloat('SHIELD!',p.x,p.y-30,'#38bdf8');snd('hit');return;}

// ── WEAPONS ───────────────────────────────────────────────────────────────────
function getWeaponOrigin(w,p,idx){
  if(p.weapons.length<=1||idx===0)return{x:p.x,y:p.y};
  const angle=G.time*1.8+(idx/p.weapons.length)*Math.PI*2;
  return{x:p.x+Math.cos(angle)*38,y:p.y+Math.sin(angle)*38};
}
function fireWeapon(w,p,idx){
  const origin=getWeaponOrigin(w,p,idx);
  const t=nearestEnemy(origin.x,origin.y,w.rng);
  // Use walk-aim direction for pistol (idx 0); secondary weapons always auto-target
  let ax=p.aimX,ay=p.aimY;
  if(idx>0&&t){
    // Lead targeting: predict where enemy will be when bullet arrives
    const dist=Math.hypot(t.x-origin.x,t.y-origin.y)||1;
    const travelTime=w.spd?dist/w.spd:0;
    const lx=(t.x+(t.vx||0)*travelTime)-origin.x;
    const ly=(t.y+(t.vy||0)*travelTime)-origin.y;
    const ld=Math.hypot(lx,ly)||1;
    ax=lx/ld;ay=ly/ld;
  }
  else if(!t&&w.type!=='freeze')return;
  w.muzzleFlash=0.08;snd('shoot');
  const ox=origin.x,oy=origin.y;
  if(w.type==='bullet'){
    const n=w.spread||1;
    for(let i=0;i<n;i++){const sc=(i-(n-1)/2)*.18,ang=Math.atan2(ay,ax)+sc;G.bullets.push({x:ox,y:oy,vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,dmg:w.dmg,rng:w.rng,traveled:0,color:w.color,piercing:w.piercing,hits:new Set(),r:5});}
  }else if(w.type==='shotgun'){
    const base=Math.atan2(ay,ax);
    for(let i=0;i<w.pellets;i++){const ang=base+(i/(w.pellets-1)-.5)*w.sAngle*2;G.bullets.push({x:ox,y:oy,vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,dmg:w.dmg,rng:w.rng,traveled:0,color:w.color,piercing:false,hits:new Set(),r:4});}
  }else if(w.type==='grenade'){
    G.bullets.push({x:ox,y:oy,vx:ax*w.spd,vy:ay*w.spd,dmg:w.dmg,blastR:w.blastR,rng:w.rng,traveled:0,color:w.color,isGrenade:true,hits:new Set(),r:9});
  }else if(w.type==='homing'){
    for(let i=0;i<w.count;i++){const sc=(i-(w.count-1)/2)*.4,ang=Math.atan2(ay,ax)+sc;G.bullets.push({x:ox,y:oy,vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,dmg:w.dmg,rng:w.rng,traveled:0,color:w.color,isHoming:true,trk:w.trk,hits:new Set(),r:6});}
  }else if(w.type==='laser'){
    w.laserTimer=0.18;w.laserAx=ax;w.laserAy=ay;w.laserOx=ox;w.laserOy=oy;
    for(const e of G.enemies){const ex=e.x-ox,ey=e.y-oy,proj=ex*ax+ey*ay;if(proj>0&&proj<w.len&&Math.abs(ey*ax-ex*ay)<e.size+(w.laserW||6))damageEnemy(e,w.dmg,true);}
  }else if(w.type==='freeze'){
    w.freezeTimer=0.4;w.freezeOx=ox;w.freezeOy=oy;
    for(const e of G.enemies){if(Math.hypot(e.x-ox,e.y-oy)<w.radius+e.size){if(w.shatter&&e.frozen>0)e.hp=0;else e.frozen=w.dur;damageEnemy(e,w.dmg,false);}}
  }
}
function updateWeapons(dt){
  const p=G.player;
  for(let i=0;i<p.weapons.length;i++){const w=p.weapons[i];
    w.timer-=dt;if(w.muzzleFlash>0)w.muzzleFlash-=dt;
    if(w.type==='flame'){
      const origin=getWeaponOrigin(w,p,i);const t=nearestEnemy(origin.x,origin.y,w.rng);
      if(t&&w.timer<=0){w.timer=1/w.rate;const d=Math.hypot(t.x-origin.x,t.y-origin.y)||1,ax=(t.x-origin.x)/d,ay=(t.y-origin.y)/d;
        for(const e of G.enemies){const ex=e.x-origin.x,ey=e.y-origin.y,proj=ex*ax+ey*ay;if(proj>0&&proj<w.rng&&Math.abs(ey*ax-ex*ay)<w.fWidth/2+e.size){damageEnemy(e,w.dmg,false);if(w.dot){e.burning=Math.max(e.burning,3);e.burnDmg=w.dmg*.3;}}}
        for(let j=0;j<5;j++){const tp=rand(.1,1);G.particles.push({x:origin.x+ax*w.rng*tp+rand(-15,15),y:origin.y+ay*w.rng*tp+rand(-15,15),vx:rand(-20,20),vy:rand(-40,0),life:rand(.2,.4),ml:.4,color:w.color,r:rand(5,12)});}}
    }else if(w.timer<=0){w.timer=1/w.rate;fireWeapon(w,p,i);}
    if(w.laserTimer>0)w.laserTimer-=dt;if(w.freezeTimer>0)w.freezeTimer-=dt;
  }
}
function updateBullets(dt){
  const dead=new Set();
  for(let i=0;i<G.bullets.length;i++){const b=G.bullets[i];
    if(b.isHoming){const t=nearestEnemy(b.x,b.y,500);if(t){const d=Math.hypot(t.x-b.x,t.y-b.y)||1,tx=(t.x-b.x)/d,ty=(t.y-b.y)/d,spd=Math.hypot(b.vx,b.vy)||1,nx=lerp(b.vx/spd,tx,b.trk*dt),ny=lerp(b.vy/spd,ty,b.trk*dt),ns=Math.hypot(nx,ny)||1;b.vx=(nx/ns)*spd;b.vy=(ny/ns)*spd;}}
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.traveled+=Math.hypot(b.vx*dt,b.vy*dt);
    if(b.traveled>b.rng){dead.add(i);continue;}
    for(const e of G.enemies){if(b.hits.has(e))continue;if(Math.hypot(b.x-e.x,b.y-e.y)<e.size+b.r){b.hits.add(e);if(b.isGrenade){explode(b.x,b.y,b.blastR,b.dmg);dead.add(i);break;}damageEnemy(e,b.dmg,true);if(!b.piercing){dead.add(i);break;}}}
  }
  G.bullets=G.bullets.filter((_,i)=>!dead.has(i));
}
function explode(x,y,r,dmg){
  for(const e of G.enemies)if(Math.hypot(e.x-x,e.y-y)<r+e.size)damageEnemy(e,dmg,true);
  addParticles(x,y,'#f97316',16,200);addParticles(x,y,'#fbbf24',8,120);
  G.particles.push({x,y,vx:0,vy:0,life:.5,ml:.5,color:'#fbbf24',r:r*.8,ring:true});shakeScreen(8);
}
function updateEBullets(dt){

  G.eBullets=G.eBullets.filter(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;if(b.life<=0)return false;if(Math.hypot(b.x-p.x,b.y-p.y)<14){damagePlayer(b.dmg);return false;}return true;});

function spawnAround(id){

function dropChest(e){if(Math.random()<e.chestChance&&e.chestType)G.chests.push({x:e.x,y:e.y,type:e.chestType,openProgress:0,state:'closed',life:15,pulseT:0});}

function updateEnemies(dt){
  const p=G.player,dead=[];
  for(let i=0;i<G.enemies.length;i++){const e=G.enemies[i];e.bobTime+=dt;
    // Spawn fade-in
    if(e.spawnTimer>0){e.spawnTimer-=dt;e.spawnAlpha=Math.min(1,1-e.spawnTimer/.35);continue;}
    else if(e.spawnAlpha<1)e.spawnAlpha=1;
    // Death animation
    if(e.dying){e.deathTimer-=dt;if(e.deathTimer<=0){killEnemy(e);dead.push(i);}continue;}
    if(e.hp<=0){e.dying=true;e.deathTimer=0.22;continue;}
    if(e.hitFlash>0)e.hitFlash-=dt;
    if(e.frozen>0)e.frozen-=dt;if(e.burning>0){e.burning-=dt;e.hp-=e.burnDmg*dt;}
    const fr=e.frozen>0?.12:1;const dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy)||1;
    if(e.ranged&&d<e.sRange){
      if(d<e.sRange*.65){e.vx=lerp(e.vx,-dx/d*e.spd*fr,5*dt);e.vy=lerp(e.vy,-dy/d*e.spd*fr,5*dt);}
      e.shootTimer-=dt;if(e.shootTimer<=0){e.shootTimer=1/e.sRate;G.eBullets.push({x:e.x,y:e.y,vx:dx/d*165,vy:dy/d*165,dmg:e.dmg,r:6,color:'#cc4444',life:3});}
    }else{e.vx=lerp(e.vx,dx/d*e.spd*fr,8*dt);e.vy=lerp(e.vy,dy/d*e.spd*fr,8*dt);}
    if(e.id==='fireboss'&&e.phase>=2&&Math.random()<.008)for(let j=0;j<5;j++){const a=Math.random()*Math.PI*2;G.eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*120,vy:Math.sin(a)*120,dmg:e.dmg*.5,r:7,color:'#ff6600',life:4});}
    e.x=clamp(e.x+e.vx*dt,20,WORLD-20);e.y=clamp(e.y+e.vy*dt,20,WORLD-20);
    if(d<e.size+14&&p.invincible<=0){damagePlayer(e.dmg);if(e.knockback){const nd=Math.hypot(p.x-e.x,p.y-e.y)||1;p.vx+=(p.x-e.x)/nd*290;p.vy+=(p.y-e.y)/nd*290;}}
    if(e.boss&&e.hp<e.maxHp*.5&&e.phase===1){e.phase=2;e.spd*=1.3;addFloat('ENRAGED!',e.x,e.y-e.size-20,'#f97316',true);shakeScreen(12);}
  }
  for(let i=dead.length-1;i>=0;i--)G.enemies.splice(dead[i],1);
}

  else if(ch.type==='boss_chest'){if(r<.4){p.tokens+=500;addFloat('+500 $PUMP!',ch.x,ch.y-35,'#daa520',true);}else if(r<.7){gainXP(300);addFloat('+300 XP!',ch.x,ch.y-35,'#fbbf24',true);}else{gainXP(200);p.tokens+=200;addFloat('TREASURE!',ch.x,ch.y-35,'#f97316',true);}}
  addParticles(ch.x,ch.y,CHEST_DEFS[ch.type].trim,10,100);
}
function updateChests(dt){
  const p=G.player;
  G.chests=G.chests.filter(ch=>{ch.life-=dt;ch.pulseT+=dt;if(ch.state==='closed'&&Math.hypot(p.x-ch.x,p.y-ch.y)<22)openChest(ch);if(ch.state==='opening'){ch.openProgress=Math.min(ch.openProgress+dt*3,1);if(ch.openProgress>=1)ch.state='open';}return ch.life>0;});
}
function gainXP(v){
  const p=G.player;p.xp+=v;
  if(p.xp>=xpNeeded(p.level)){p.xp-=xpNeeded(p.level);p.level++;addFloat('LEVEL UP!',p.x,p.y-60,'#daa520',true);G.phase='levelup';G.upgradeChoices=genUpgrades();snd('levelup');}
}
function updateOrbs(dt){
  const p=G.player,dead=[];
  for(let i=0;i<G.xpOrbs.length;i++){const o=G.xpOrbs[i];o.vx*=.88;o.vy*=.88;const d=Math.hypot(o.x-p.x,o.y-p.y)||1;
    if(d<p.magnetRange){const pull=p.magnetSpeed+(1-d/p.magnetRange)*350;o.vx+=(p.x-o.x)/d*pull*dt;o.vy+=(p.y-o.y)/d*pull*dt;}
    o.x+=o.vx*dt;o.y+=o.vy*dt;if(d<18){gainXP(o.val);dead.push(i);}}
  for(let i=dead.length-1;i>=0;i--)G.xpOrbs.splice(dead[i],1);
}
function genUpgrades(){
  const p=G.player,opts=[];
  for(const w of p.weapons)if(w.ulv<WDEFS[w.id].ups.length)opts.push({type:'wup',w,name:WDEFS[w.id].ups[w.ulv],desc:w.name,color:w.color,icon:w.icon});
  for(const id of Object.keys(WDEFS))if(!p.weaponSet.has(id))opts.push({type:'neww',wid:id,name:WDEFS[id].name,desc:'New Weapon!',color:WDEFS[id].color,icon:WDEFS[id].icon});
  for(const id of Object.keys(PDEFS)){const lv=p.passiveLvl[id]||0;if(lv<PDEFS[id].ups.length)opts.push({type:'pass',pid:id,plv:lv,name:PDEFS[id].ups[lv],desc:PDEFS[id].name,color:PDEFS[id].color,icon:PDEFS[id].icon});}
  opts.sort(()=>Math.random()-.5);return opts.slice(0,3);
}
function applyWUp(w,id,lv){
  if(id==='pistol'){if(lv===0)w.dmg*=1.5;else if(lv===1)w.rate*=1.5;else w.piercing=true;}
  else if(id==='machinegun'){if(lv===0)w.rate*=1.3;else if(lv===1)w.dmg*=1.4;else w.spread=3;}
  else if(id==='shotgun'){if(lv===0)w.dmg*=1.6;else if(lv===1)w.pellets+=2;else w.sAngle*=1.5;}
  else if(id==='laser'){if(lv===0)w.dmg*=1.5;else if(lv===1)w.rate*=1.3;else w.laserW=14;}
  else if(id==='grenade'){if(lv===0)w.blastR*=1.5;else if(lv===1)w.dmg*=1.6;else w.rate*=1.3;}
  else if(id==='homing'){if(lv===0)w.dmg*=1.5;else if(lv===1)w.trk*=1.3;else w.count++;}
  else if(id==='freeze'){if(lv===0)w.dur*=1.5;else if(lv===1)w.radius*=1.4;else w.shatter=true;}
  else if(id==='flamethrower'){if(lv===0)w.dmg*=1.5;else if(lv===1)w.rng*=1.4;else w.dot=true;}
}
function applyPassive(p,id,lv){
  if(id==='shield'){if(lv===0){p.shieldMax++;p.shieldHp=p.shieldMax;}else p.shieldFast=true;}
  else if(id==='armor')p.armor=Math.min(p.armor+(lv===0?.2:lv===1?.3:.5),.85);
  else if(id==='magnet'){if(lv===0)p.magnetRange*=1.5;else p.magnetSpeed*=2;}
  else if(id==='speed')p.speed*=lv===0?1.3:lv===1?1.6:2;
  else if(id==='health'){const add=lv===0?50:100;p.maxHp+=add;p.hp=Math.min(p.hp+add,p.maxHp);}
  else if(id==='crit'){if(lv<2)p.critChance+=lv===0?.2:.4;else p.critMult=3;}
}
function applyUpgrade(ch){
  const p=G.player;
  if(ch.type==='wup'){applyWUp(ch.w,ch.w.id,ch.w.ulv);ch.w.ulv++;}
  else if(ch.type==='neww'){p.weapons.push(mkWeapon(ch.wid));p.weaponSet.add(ch.wid);}
  else if(ch.type==='pass'){applyPassive(p,ch.pid,ch.plv);p.passiveLvl[ch.pid]=(p.passiveLvl[ch.pid]||0)+1;}
  G.phase='playing';
}

// ── PLAYER UPDATE (walk-direction aiming) ─────────────────────────────────────
function updatePlayer(dt){
  const p=G.player;let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx-=1;if(keys['ArrowRight']||keys['KeyD'])dx+=1;
  if(keys['ArrowUp']||keys['KeyW'])dy-=1;if(keys['ArrowDown']||keys['KeyS'])dy+=1;
  if(touch.active){dx=touch.dx;dy=touch.dy;}
  p.moving=dx!==0||dy!==0;
  if(p.moving){
    const l=Math.hypot(dx,dy)||1;dx/=l;dy/=l;
    // Smoothly rotate aim toward walk direction
    p.aimX=lerp(p.aimX,dx,10*dt);p.aimY=lerp(p.aimY,dy,10*dt);
    const al=Math.hypot(p.aimX,p.aimY)||1;p.aimX/=al;p.aimY/=al;
    p.dir=dx<0?-1:dx>0?1:p.dir;
    p.walkCycle=(p.walkCycle+dt*8)%(Math.PI*2);
  }else{
    // When idle: slowly track nearest enemy
    const t=nearestEnemy(p.x,p.y,600);
    if(t){const d=Math.hypot(t.x-p.x,t.y-p.y)||1;
      p.aimX=lerp(p.aimX,(t.x-p.x)/d,4*dt);p.aimY=lerp(p.aimY,(t.y-p.y)/d,4*dt);
      p.dir=t.x>p.x?1:-1;}
  }
  p.vx=lerp(p.vx,dx*p.speed,12*dt);p.vy=lerp(p.vy,dy*p.speed,12*dt);
  p.x=clamp(p.x+p.vx*dt,20,WORLD-20);p.y=clamp(p.y+p.vy*dt,20,WORLD-20);
  if(p.invincible>0)p.invincible-=dt;
  if(p.shieldMax>0&&p.shieldHp<p.shieldMax){p.shieldTimer-=dt;if(p.shieldTimer<=0){p.shieldHp++;if(p.shieldHp<p.shieldMax)p.shieldTimer=p.shieldFast?3:5;}}
}
function updateSpawning(dt){
  G.spawnTimer-=dt;if(G.spawnTimer<=0){const n=1+Math.floor(G.time/22),pool=spawnPool(G.time);for(let i=0;i<n;i++)spawnAround(pool[randI(0,pool.length-1)]);G.spawnTimer=Math.max(.35,1.7-G.time*.007);}
  G.bossTimer-=dt;
  if(G.bossTimer<=0&&G.time>60){G.bossTimer=60;const bossScale=1+G.bossCount*.25;
    const bt=G.time>180?'overlord':G.time>120?'fireboss':G.time>90?'greatdemon':Math.random()<.5?'zombieking':'fireboss';
    const ang=Math.random()*Math.PI*2,sd=Math.max(W,H)*.6;
    const boss=mkEnemy(bt,clamp(G.player.x+Math.cos(ang)*sd,50,WORLD-50),clamp(G.player.y+Math.sin(ang)*sd,50,WORLD-50));
    boss.hp=Math.floor(boss.hp*bossScale);boss.maxHp=boss.hp;boss.dmg=Math.floor(boss.dmg*bossScale);
    G.enemies.push(boss);G.bossAnnounce=4;G.bossName=boss.name;snd('boss');shakeScreen(15);}
  if(G.bossAnnounce>0)G.bossAnnounce-=dt;
  if(G.time>=G.nextDiffTime){G.diffScale=1+(G.time/60)*.2;G.nextDiffTime+=30;
    G.waveNum++;G.waveAnnounce=3;shakeScreen(6);}
  if(G.waveAnnounce>0)G.waveAnnounce-=dt;
  if(G.streakTimer>0){G.streakTimer-=dt;if(G.streakTimer<=0){G.streak=0;}}
  if(G.damageMultTimer>0){G.damageMultTimer-=dt;if(G.damageMultTimer<=0)G.damageMulti=1;}
}
function updateCamera(dt){const tx=G.player.x-W/2,ty=G.player.y-H/2;G.cam.x=lerp(G.cam.x,tx,8*dt);G.cam.y=lerp(G.cam.y,ty,8*dt);}
function update(dt){
  G.time+=dt;G.frame++;G.screenShake=Math.max(0,G.screenShake-dt*40);G.hitFlash=Math.max(0,G.hitFlash-dt*3);
  updatePlayer(dt);updateWeapons(dt);updateBullets(dt);updateEBullets(dt);
  updateEnemies(dt);updateOrbs(dt);updateChests(dt);
  G.floats=G.floats.filter(f=>{f.y+=f.vy*dt;f.life-=dt;return f.life>0;});
  G.particles=G.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.87;p.vy*=.87;p.life-=dt;return p.life>0;});
  updateSpawning(dt);updateCamera(dt);
}

    const by=PY+66+i*44;
    PAUSE_BTNS.push({x:BX2,y:by,w:BW,h:34,action});
    roundRect(BX2,by,BW,34,5);ctx.fillStyle='rgba(20,8,0,0.9)';ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=1;roundRect(BX2,by,BW,34,5);ctx.stroke();
    ctx.fillStyle=col;ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText(label,W/2,by+22);
  }

  if(!G.pauseShowLB){
    pb(0,'▶  RESUME','#daa520',()=>{G.phase=G.prevPhase||'playing';});
    pb(1,'🏆  LEADERBOARD','#14f195',()=>{G.pauseShowLB=true;});
    pb(2,'☠  FORFEIT RUN','#ef4444',()=>{endGame();});
    pb(3,'← MAIN PAGE','#8b6f47',()=>{window.location.href='index.html';});
  }else{
    // Leaderboard inline
    const lb=lbLoad();
    ctx.fillStyle='#5c4033';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText('🏆 HALL OF FAME',W/2,PY+72);
    if(lb.length===0){ctx.fillStyle='#5c4033';ctx.font='11px monospace';ctx.fillText('No runs yet',W/2,PY+120);}
    else lb.slice(0,5).forEach((e,i)=>{
      const ry=PY+90+i*26;
      const rc=i===0?'#daa520':i===1?'#c0c0c0':i===2?'#cd7f32':'#8b6f47';
      ctx.fillStyle=rc;ctx.font=(i===0?'bold ':'')+'10px monospace';
      ctx.textAlign='left';ctx.fillText('#'+(i+1),PX+16,ry);
      ctx.fillText((e.addr||'Wanderer').slice(0,14),PX+42,ry);
      ctx.textAlign='right';ctx.fillText(e.score+' pts',PX+PW-16,ry);
    });
    ctx.textAlign='center';
    const backY=PY+PH-44;
    PAUSE_BTNS.push({x:BX2,y:backY,w:BW,h:30,action:()=>{G.pauseShowLB=false;}});
    roundRect(BX2,backY,BW,30,5);ctx.fillStyle='rgba(20,8,0,0.9)';ctx.fill();
    ctx.strokeStyle='#5c4033';ctx.lineWidth=1;roundRect(BX2,backY,BW,30,5);ctx.stroke();
    ctx.fillStyle='#8b6f47';ctx.font='bold 11px monospace';ctx.fillText('← BACK',W/2,backY+20);
  }
  ctx.textAlign='left';
}

// ── MENU / LANDING PAGE ───────────────────────────────────────────────────────
let MENU_BTNS=[],DEAD_BTNS=[],PAUSE_BTNS=[];
let menuWalkCycle=0;

function menuBtn(x,y,w,h,label,color,action){
  MENU_BTNS.push({x,y,w,h,action});
  const hover=false; // static for now
  roundRect(x,y,w,h,6);ctx.fillStyle='rgba(30,12,2,.9)';ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=2;roundRect(x,y,w,h,6);ctx.stroke();
  ctx.fillStyle=color;ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText(label,x+w/2,y+h/2+5);ctx.textAlign='left';
}

function drawSwatches(opts,selIdx,x,y,label,handler){
  ctx.fillStyle='#8b6f47';ctx.font='bold 10px monospace';ctx.textAlign='left';ctx.fillText(label,x,y-4);
  for(let i=0;i<opts.length;i++){
    const sx2=x+i*30,sy2=y;
    MENU_BTNS.push({x:sx2,y:sy2,w:24,h:24,action:()=>handler(i)});
    ctx.fillStyle=opts[i].c;ctx.fillRect(sx2,sy2,24,24);
    if(i===selIdx){ctx.strokeStyle='#ffd700';ctx.lineWidth=2.5;ctx.strokeRect(sx2-1,sy2-1,26,26);}else{ctx.strokeStyle='#5c4033';ctx.lineWidth=1;ctx.strokeRect(sx2,sy2,24,24);}
  }
}

function drawMenuBG(t){
  ctx.fillStyle='#0d0a08';ctx.fillRect(0,0,W,H);
  if(tilePat){ctx.save();ctx.globalAlpha=.5;ctx.fillStyle=tilePat;ctx.fillRect(0,0,W,H);ctx.restore();}
  // Torches around the edges
  for(const tr of menuTorches)drawTorch(tr.x,tr.y,t);
  // Dark vignette
  const vg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.72);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.65)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

function drawMenuPlay(t){
  const PW=560,PH=390,PX=(W-PW)/2,PY=(H-PH)/2+20;
  // Main panel
  ctx.fillStyle='rgba(10,5,1,.92)';roundRect(PX,PY,PW,PH,10);ctx.fill();
  ctx.strokeStyle='#8b4513';ctx.lineWidth=3;roundRect(PX,PY,PW,PH,10);ctx.stroke();
  ctx.strokeStyle='#daa520';ctx.lineWidth=1;roundRect(PX+4,PY+4,PW-8,PH-8,8);ctx.stroke();

  // ── LEFT: Character ─────────────────────────────────────────────────────────
  const LX=PX+22,LY=PY+20;
  ctx.fillStyle='#daa520';ctx.font='bold 11px monospace';ctx.textAlign='left';ctx.fillText('CHARACTER',LX,LY+12);
  ctx.strokeStyle='#5c4033';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(LX,LY+17);ctx.lineTo(LX+160,LY+17);ctx.stroke();

  // Big character preview
  menuWalkCycle=(menuWalkCycle+0.04)%(Math.PI*2);
  const aimAng=t*.8;
  drawPlayerAt(LX+80,LY+110,1,Math.cos(aimAng),Math.sin(aimAng)*0.3,menuWalkCycle,0,false,0,2.5);

  // Swatches
  drawSwatches(HAIR_OPTS,CHAR.hairIdx,LX,LY+200,'HAIR COLOR',i=>CHAR.hairIdx=i);
  drawSwatches(ARMOR_OPTS,CHAR.armorIdx,LX,LY+244,'ARMOR COLOR',i=>CHAR.armorIdx=i);

  // ── RIGHT: Wallet + Start ───────────────────────────────────────────────────
  const RX=PX+PW/2+10,RW=PW/2-32,RY=PY+20;
  ctx.fillStyle='#14f195';ctx.font='bold 11px monospace';ctx.fillText('WALLET',RX,RY+12);
  ctx.strokeStyle='#14f19540';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(RX,RY+17);ctx.lineTo(RX+RW,RY+17);ctx.stroke();

  // Wallet status block
  if(WALLET.connected){
    const short=WALLET.address.slice(0,4)+'...'+WALLET.address.slice(-4);
    // Green dot + address
    ctx.fillStyle='#14f195';ctx.beginPath();ctx.arc(RX+5,RY+34,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#14f195';ctx.font='bold 11px monospace';ctx.fillText('Connected',RX+14,RY+38);
    ctx.fillStyle='#8b6f47';ctx.font='10px monospace';ctx.fillText(short,RX,RY+54);
    // SOL + PUMP balances
    if(WALLET.solBalance!=null){
      ctx.fillStyle='#9ca3af';ctx.fillText('◎ '+WALLET.solBalance+' SOL',RX,RY+70);}
    if(WALLET.pumpBalance!=null){
      ctx.fillStyle='#14f195';ctx.fillText('⬡ '+(WALLET.pumpBalance).toLocaleString()+' PUMP',RX,RY+84);}
    else if(!PUMP_MINT){ctx.fillStyle='#5c4033';ctx.font='9px monospace';ctx.fillText('Set PUMP_MINT for balance',RX,RY+84);}
    menuBtn(RX,RY+100,RW,26,'Disconnect','#5c4033',()=>connectWallet());
  }else if(WALLET.loading){
    const dots='.'.repeat((Math.floor(Date.now()/300)%4)+1);
    ctx.fillStyle='#cd853f';ctx.font='11px monospace';ctx.fillText('Connecting'+dots,RX,RY+44);
  }else{
    ctx.fillStyle='#8b6f47';ctx.font='10px monospace';
    ctx.fillText('Connect to earn & claim PUMP',RX,RY+34);
    menuBtn(RX,RY+44,RW,34,'🔮 Connect Phantom','#a78bfa',()=>connectWallet());
  }

  // Leaderboard teaser
  const lb=lbLoad();
  ctx.fillStyle='#5c4033';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(RX,RY+148);ctx.lineTo(RX+RW,RY+148);ctx.stroke();
  if(lb.length>0){
    ctx.fillStyle='#8b6f47';ctx.font='bold 10px monospace';ctx.fillText('BEST RUN',RX,RY+162);
    ctx.fillStyle='#daa520';ctx.font='bold 11px monospace';ctx.fillText('#1  '+lb[0].score+' pts',RX,RY+176);
    ctx.fillStyle='#14f195';ctx.font='10px monospace';ctx.fillText((lb[0].pump||0)+' PUMP  ('+lb[0].time+'s)',RX,RY+190);
    ctx.fillStyle='#8b6f47';ctx.fillText(lb[0].addr||'Wanderer',RX,RY+204);
  }else{ctx.fillStyle='#5c4033';ctx.font='10px monospace';ctx.fillText('No runs yet',RX,RY+166);}

  // pump.fun link button
  ctx.fillStyle='#5c4033';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(RX,RY+220);ctx.lineTo(RX+RW,RY+220);ctx.stroke();
  MENU_BTNS.push({x:RX,y:RY+228,w:RW,h:24,action:()=>window.open('https://pump.fun','_blank')});
  ctx.fillStyle='rgba(10,20,10,.8)';ctx.fillRect(RX,RY+228,RW,24);ctx.strokeStyle='#14f19540';ctx.lineWidth=1;ctx.strokeRect(RX,RY+228,RW,24);
  ctx.fillStyle='#14f195';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText('◎ Buy $PUMP on pump.fun',RX+RW/2,RY+244);ctx.textAlign='left';

  // START / wallet-gate button
  const pulse=.7+Math.sin(t*3)*.3;
  if(!WALLET.connected){
    roundRect(RX,PY+PH-64,RW,48,8);ctx.fillStyle='rgba(15,7,0,.8)';ctx.fill();
    ctx.strokeStyle='#3a2000';ctx.lineWidth=1;roundRect(RX,PY+PH-64,RW,48,8);ctx.stroke();
    ctx.fillStyle='#5c4033';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText('Connect wallet to play',RX+RW/2,PY+PH-34);ctx.textAlign='left';
  }else if(hasRunUsed(WALLET.address)){
    roundRect(RX,PY+PH-64,RW,48,8);ctx.fillStyle='rgba(10,5,0,.9)';ctx.fill();
    ctx.strokeStyle='#5c4033';ctx.lineWidth=1;roundRect(RX,PY+PH-64,RW,48,8);ctx.stroke();
    ctx.fillStyle='#7c2d12';ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText('✗  RUN USED',RX+RW/2,PY+PH-42);
    ctx.fillStyle='#5c4033';ctx.font='9px monospace';
    ctx.fillText('1 run per wallet · no replays',RX+RW/2,PY+PH-24);ctx.textAlign='left';
  }else{
    MENU_BTNS.push({x:RX,y:PY+PH-64,w:RW,h:48,action:()=>initGame()});
    ctx.shadowBlur=20*pulse;ctx.shadowColor='#daa520';
    roundRect(RX,PY+PH-64,RW,48,8);ctx.fillStyle='rgba(50,25,0,.95)';ctx.fill();
    ctx.strokeStyle='#daa520';ctx.lineWidth=2+pulse;roundRect(RX,PY+PH-64,RW,48,8);ctx.stroke();
    ctx.fillStyle='#fef3c7';ctx.font='bold 16px monospace';ctx.textAlign='center';
    ctx.fillText('▶  ENTER THE PIT',RX+RW/2,PY+PH-34);ctx.textAlign='left';ctx.shadowBlur=0;
  }
}

function drawMenuScores(){
  const PW=560,PH=390,PX=(W-PW)/2,PY=(H-PH)/2+20;
  ctx.fillStyle='rgba(10,5,1,.92)';roundRect(PX,PY,PW,PH,10);ctx.fill();
  ctx.strokeStyle='#8b4513';ctx.lineWidth=3;roundRect(PX,PY,PW,PH,10);ctx.stroke();
  ctx.strokeStyle='#daa520';ctx.lineWidth=1;roundRect(PX+4,PY+4,PW-8,PH-8,8);ctx.stroke();

  ctx.textAlign='center';pxText('HALL OF FAME',W/2,PY+30,18,'#daa520','center');
  ctx.strokeStyle='#5c4033';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PX+20,PY+42);ctx.lineTo(PX+PW-20,PY+42);ctx.stroke();

  const lb=lbLoad();
  if(lb.length===0){ctx.fillStyle='#5c4033';ctx.font='14px monospace';ctx.textAlign='center';ctx.fillText('No scores yet — play a game!',W/2,PY+PH/2);ctx.textAlign='left';return;}

  // Header
  const cols=[PX+24,PX+60,PX+220,PX+310,PX+380,PX+440];
  ctx.fillStyle='#8b4513';ctx.font='bold 10px monospace';ctx.textAlign='left';
  ['#','SURVIVOR','SCORE','TIME','KILLS','BOSS'].forEach((h,i)=>ctx.fillText(h,cols[i],PY+58));
  ctx.strokeStyle='#5c4033';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PX+20,PY+64);ctx.lineTo(PX+PW-20,PY+64);ctx.stroke();

  lb.forEach((e,i)=>{
    const ry=PY+82+i*28;
    if(i===0){ctx.fillStyle='rgba(218,165,32,.08)';ctx.fillRect(PX+16,ry-16,PW-32,24);}
    const rankColor=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#5c4033';
    ctx.fillStyle=rankColor;ctx.font=`bold ${i<3?12:10}px monospace`;ctx.fillText('#'+(i+1),cols[0],ry);
    ctx.fillStyle=i===0?'#daa520':'#cd853f';ctx.font=`${i<3?11:10}px monospace`;
    ctx.fillText((e.addr||'Wanderer').slice(0,18),cols[1],ry);
    ctx.fillStyle='#fef3c7';ctx.fillText(e.score,cols[2],ry);
    ctx.fillStyle='#8b6f47';ctx.fillText(e.time+'s',cols[3],ry);
    ctx.fillText(e.kills,cols[4],ry);ctx.fillText(e.bosses,cols[5],ry);
  });

  menuBtn((W-160)/2,PY+PH-56,160,36,'Clear Scores','#7c2d12',()=>{localStorage.removeItem('pumppit_lb');});
  ctx.textAlign='left';
}

function drawMenu(t){
  MENU_BTNS=[];
  drawMenuBG(t);

  // Title — pixel logo
  const lw=100,lh=100;
  if(LOGO_IMG.complete&&LOGO_IMG.naturalWidth>0){
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(LOGO_IMG,Math.floor(W/2-lw/2),6,lw,lh);
    ctx.imageSmoothingEnabled=true;
  }else{
    ctx.textAlign='center';ctx.shadowBlur=30;ctx.shadowColor='#cd853f';
    pxText('PUMP PIT',W/2,80,28,'#daa520','center');ctx.shadowBlur=0;
  }

  // Tab bar
  const tabs=[['play','PLAY'],['scores','SCORES']];
  tabs.forEach(([id,label],i)=>{
    const tx=W/2-80+i*84,ty=128,tw=76,th=28;
    const active=G.menuTab===id;
    MENU_BTNS.push({x:tx,y:ty,w:tw,h:th,action:()=>{G.menuTab=id;}});
    ctx.fillStyle=active?'rgba(139,69,19,.7)':'rgba(20,10,2,.7)';roundRect(tx,ty,tw,th,5);ctx.fill();
    ctx.strokeStyle=active?'#daa520':'#5c4033';ctx.lineWidth=active?2:1;roundRect(tx,ty,tw,th,5);ctx.stroke();
    ctx.fillStyle=active?'#daa520':'#8b6f47';ctx.font='bold 12px monospace';ctx.fillText(label,tx+tw/2,ty+18);
  });
  ctx.textAlign='left';

  if(G.menuTab==='play')drawMenuPlay(t);
  else drawMenuScores();

  // ← Back to site button (top-left)
  const bw=130,bh=26,bx=12,by=12;
  MENU_BTNS.push({x:bx,y:by,w:bw,h:bh,action:()=>window.location.href='index.html'});
  ctx.fillStyle='rgba(6,3,0,0.8)';ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='#3a2000';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#5c4033';ctx.font='bold 10px monospace';ctx.textAlign='left';
  ctx.fillText('← MAIN SITE',bx+10,by+17);

  // ── pump.fun / Solana footer ─────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,H-28,W,28);
  ctx.fillStyle='#14f195';ctx.font='bold 10px monospace';ctx.textAlign='center';
  ctx.fillText('◎ Powered by Solana Mainnet',W/2-60,H-10);
  ctx.fillStyle='#5c4033';ctx.fillText('|',W/2+74,H-10);
  MENU_BTNS.push({x:W/2+80,y:H-28,w:120,h:28,action:()=>window.open('https://pump.fun','_blank')});
  ctx.fillStyle='#8b6f47';ctx.fillText('pump.fun',W/2+120,H-10);
  ctx.textAlign='left';
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
let last=0,menuT=0;
function loop(ts){
  try{
    const dt=Math.min((ts-last)/1000,.05);last=ts;
    ctx.clearRect(0,0,W,H);
    if(WALLET.connected){
      WALLET.balanceTimer-=dt;
      if(WALLET.balanceTimer<=0)fetchBalances();
    }
    if(G.phase==='menu'){menuT+=dt;drawMenu(menuT);}
    else if(G.phase==='dead')drawDead();
    else{if(G.phase==='playing')update(dt);draw();if(G.phase==='levelup')drawLevelUp();else if(G.phase==='paused')drawPause();}
  }catch(err){
    console.error('[PumpPit loop error]',err);
  }
  requestAnimationFrame(loop);
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ')&&G.phase==='dead'){G.phase='menu';return;}
  if(G.phase==='levelup'&&e.key!=='Escape'){const i=parseInt(e.key)-1;if(i>=0&&i<G.upgradeChoices.length)applyUpgrade(G.upgradeChoices[i]);}
  if(e.key==='Escape'){
    if(G.phase==='playing'||G.phase==='levelup'){G.prevPhase=G.phase;G.phase='paused';G.pauseShowLB=false;return;}
    if(G.phase==='paused'){G.phase=G.prevPhase||'playing';return;}
  }
});
c.addEventListener('click',e=>{
  const rect=c.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
  if(G.phase==='menu'){for(const btn of MENU_BTNS){if(mx>=btn.x&&mx<=btn.x+btn.w&&my>=btn.y&&my<=btn.y+btn.h){btn.action();break;}}return;}
  if(G.phase==='dead'){for(const btn of DEAD_BTNS){if(mx>=btn.x&&mx<=btn.x+btn.w&&my>=btn.y&&my<=btn.y+btn.h){btn.action();break;}}return;}
  if(G.phase==='paused'){for(const btn of PAUSE_BTNS){if(mx>=btn.x&&mx<=btn.x+btn.w&&my>=btn.y&&my<=btn.y+btn.h){btn.action();break;}}return;}
  if(G.phase==='levelup'){
    const chs=G.upgradeChoices,cw2=Math.min(190,(W-60)/chs.length),tot=chs.length*(cw2+14)-14,sx2=W/2-tot/2,cy=H/2-90;
    for(let i=0;i<chs.length;i++){const ccx=sx2+i*(cw2+14);if(mx>=ccx&&mx<=ccx+cw2&&my>=cy&&my<=cy+180){applyUpgrade(chs[i]);break;}}
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
initBG();
tryAutoConnect();
requestAnimationFrame(loop);
</script>
