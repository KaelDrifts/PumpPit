<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>PumpPit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
let W=0,H=0;
function resize(){W=c.width=Math.min(window.innerWidth,900);H=c.height=Math.min(window.innerHeight,640);}
resize();window.addEventListener('resize',resize);
const rand=(a,b)=>a+Math.random()*(b-a);
const randI=(a,b)=>Math.floor(rand(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const WORLD=4000;
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;keys[e.code]=true;});
window.addEventListener('keyup',e=>{delete keys[e.key];delete keys[e.code];});
let touch={active:false,startX:0,startY:0,dx:0,dy:0};
c.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];touch={active:true,startX:t.clientX,startY:t.clientY,x:t.clientX,y:t.clientY,dx:0,dy:0};},{passive:false});
c.addEventListener('touchmove',e=>{e.preventDefault();if(!touch.active)return;const t=e.touches[0];const dx=t.clientX-touch.startX,dy=t.clientY-touch.startY;const d=Math.hypot(dx,dy)||1;const max=60;touch.dx=d>max?dx/d:dx/max;touch.dy=d>max?dy/d:dy/max;},{passive:false});
c.addEventListener('touchend',e=>{e.preventDefault();touch.active=false;touch.dx=0;touch.dy=0;},{passive:false});

const WDEFS={
  pistol:{name:'Pistol',icon:'🔫',color:'#f59e0b',type:'bullet',dmg:15,rate:1.2,spd:420,rng:520,pellets:1,sAngle:0,ups:['+50% Damage','Rapid Fire','Piercing Bullets']},
  machinegun:{name:'Machine Gun',icon:'⚙️',color:'#ef4444',type:'bullet',dmg:8,rate:5,spd:500,rng:450,pellets:1,sAngle:0,ups:['+30% Fire Rate','+40% Damage','Spread Shot']},
  shotgun:{name:'Shotgun',icon:'💥',color:'#f97316',type:'shotgun',dmg:22,rate:0.6,spd:370,rng:300,pellets:5,sAngle:0.45,ups:['+60% Damage','+2 Pellets','Wider Spread']},
  laser:{name:'Laser',icon:'🔆',color:'#a78bfa',type:'laser',dmg:35,rate:0.7,len:320,laserW:6,ups:['+50% Damage','+30% Fire Rate','Wider Beam']},
  grenade:{name:'Grenade',icon:'💣',color:'#84cc16',type:'grenade',dmg:65,rate:0.4,spd:240,rng:350,blastR:85,ups:['+50% Blast Radius','+60% Damage','+30% Fire Rate']},
  homing:{name:'Missiles',icon:'🚀',color:'#06b6d4',type:'homing',dmg:38,rate:0.8,spd:160,rng:600,trk:2.5,count:1,ups:['+50% Damage','+30% Tracking','+1 Missile']},
  freeze:{name:'Freeze',icon:'❄️',color:'#7dd3fc',type:'freeze',dmg:12,rate:0.5,radius:130,dur:2.2,ups:['+50% Duration','+40% Area','Shatter']},
  flamethrower:{name:'Flamethrower',icon:'🔥',color:'#fb923c',type:'flame',dmg:22,rate:10,rng:190,fWidth:65,ups:['+50% Damage','+40% Range','Burn DOT']},
};
const PDEFS={
  shield:{name:'Shield',icon:'🛡️',color:'#38bdf8',ups:['+1 Shield Charge','Faster Regen']},
  armor:{name:'Armor',icon:'🥋',color:'#9ca3af',ups:['+20% Damage Reduction','+30% Reduction','+50% Reduction']},
  magnet:{name:'Magnet',icon:'🧲',color:'#f472b6',ups:['+50% Pickup Range','+100% Attraction Speed']},
  speed:{name:'Speed',icon:'👟',color:'#4ade80',ups:['+30% Move Speed','+60% Move Speed','+100% Move Speed']},
  health:{name:'Health',icon:'❤️',color:'#f87171',ups:['+50 Max HP','+100 Max HP']},
  crit:{name:'Crit',icon:'⚡',color:'#fbbf24',ups:['+20% Crit Chance','+40% Crit Chance','3x Crit Damage']},
};
const EDEFS={
  zombie:    {n:'Zombie',     color:'#4ade80',size:13,hp:20, dmg:5, spd:55, xp:10, tok:1, tier:1},
  skeleton:  {n:'Skeleton',   color:'#d1d5db',size:13,hp:30, dmg:7, spd:75, xp:15, tok:2, tier:1},
  goblin:    {n:'Goblin',     color:'#86efac',size:11,hp:25, dmg:6, spd:100,xp:12, tok:2, tier:1},
  fastzombie:{n:'Fast Zombie',color:'#16a34a',size:13,hp:35, dmg:8, spd:135,xp:20, tok:3, tier:2},
  witch:     {n:'Witch',      color:'#a855f7',size:13,hp:40, dmg:10,spd:68, xp:25, tok:4, tier:2,ranged:true,sRange:220,sRate:2},
  orc:       {n:'Orc',        color:'#22c55e',size:18,hp:50, dmg:12,spd:65, xp:30, tok:5, tier:2,knockback:true},
  demon:     {n:'Demon',      color:'#ef4444',size:15,hp:60, dmg:15,spd:130,xp:40, tok:7, tier:3},
  sorcerer:  {n:'Sorcerer',   color:'#8b5cf6',size:14,hp:55, dmg:14,spd:55, xp:35, tok:6, tier:3,ranged:true,sRange:280,sRate:1.5},
  wyvern:    {n:'Wyvern',     color:'#3b82f6',size:20,hp:80, dmg:18,spd:115,xp:50, tok:10,tier:3},
  zombieking:{n:'Zombie King',color:'#166534',size:28,hp:150,dmg:20,spd:58, xp:100,tok:25,tier:4,boss:true},
  greatdemon:{n:'Gr. Demon',  color:'#7f1d1d',size:24,hp:120,dmg:25,spd:120,xp:80, tok:20,tier:4,boss:true},
  overlord:  {n:'Overlord',   color:'#581c87',size:32,hp:300,dmg:30,spd:80, xp:200,tok:100,tier:4,boss:true},
};
function spawnPool(t){
  if(t<30)return['zombie','skeleton','goblin'];
  if(t<60)return['zombie','skeleton','goblin','fastzombie','witch'];
  if(t<90)return['skeleton','goblin','fastzombie','witch','orc'];
  if(t<120)return['fastzombie','witch','orc','demon','sorcerer'];
  return['orc','demon','sorcerer','wyvern'];
}
let G={phase:'start'};
function xpNeeded(lv){return Math.floor(100*Math.pow(lv,1.35));}
function mkWeapon(id){
  const d=WDEFS[id];
  return{id,name:d.name,icon:d.icon,color:d.color,type:d.type,
    dmg:d.dmg,rate:d.rate,spd:d.spd||400,rng:d.rng||400,
    pellets:d.pellets||1,sAngle:d.sAngle||0,
    len:d.len||320,laserW:d.laserW||6,
    blastR:d.blastR||80,trk:d.trk||2.5,count:d.count||1,
    radius:d.radius||130,dur:d.dur||2,fWidth:d.fWidth||65,
    spread:1,piercing:false,dot:false,shatter:false,
    timer:Math.random()*0.5,ulv:0,
    laserTimer:0,laserAx:1,laserAy:0,freezeTimer:0};
}
function mkPlayer(){
  return{x:WORLD/2,y:WORLD/2,vx:0,vy:0,
    hp:100,maxHp:100,speed:165,level:1,xp:0,
    weapons:[mkWeapon('pistol')],weaponSet:new Set(['pistol']),
    passiveLvl:{},
    shieldHp:0,shieldMax:0,shieldTimer:0,shieldFast:false,
    magnetRange:80,magnetSpeed:150,critChance:0,critMult:2,armor:0,
    dir:1,aimX:1,aimY:0,invincible:0,tokens:0};
}
function initGame(){
  G={phase:'playing',time:0,frame:0,
    player:mkPlayer(),enemies:[],bullets:[],eBullets:[],
    xpOrbs:[],particles:[],floats:[],
    cam:{x:0,y:0},spawnTimer:1.5,bossTimer:65,kills:0,upgradeChoices:[]};
  G.cam.x=G.player.x-W/2;G.cam.y=G.player.y-H/2;
}
function wx(x){return x-G.cam.x;}
function wy(y){return y-G.cam.y;}
function nearestEnemy(x,y,rng){
  let best=null,bd=rng;
  for(const e of G.enemies){const d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}}
  return best;
}
function addFloat(text,x,y,color){G.floats.push({text,x,y,vy:-55,life:1.0,ml:1.0,color});}
function addParticles(x,y,color,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=rand(40,140);
    G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(0.3,0.6),ml:0.5,color,r:rand(3,8)});}
}
function damageEnemy(e,dmg,canCrit){
  const p=G.player;
  if(canCrit&&Math.random()<p.critChance){dmg=Math.floor(dmg*p.critMult);addFloat('CRIT! -'+dmg,e.x,e.y-e.size-2,'#fbbf24');}
  else addFloat('-'+dmg,e.x,e.y-e.size-2,'#f87171');
  e.hp-=dmg;
}
function damagePlayer(dmg){
  const p=G.player;
  if(p.invincible>0)return;
  dmg=Math.floor(dmg*(1-p.armor));
  if(p.shieldHp>0){p.shieldHp--;p.shieldTimer=p.shieldFast?3:5;addFloat('SHIELD!',p.x,p.y-30,'#38bdf8');return;}
  p.hp-=dmg;p.invincible=0.5;addFloat('-'+dmg,p.x,p.y-25,'#ef4444');
  if(p.hp<=0){p.hp=0;G.phase='dead';}
}
function fireWeapon(w,p){
  const t=nearestEnemy(p.x,p.y,w.rng);
  if(!t&&w.type!=='freeze')return;
  let ax=p.aimX,ay=p.aimY;
  if(t){const d=Math.hypot(t.x-p.x,t.y-p.y)||1;ax=(t.x-p.x)/d;ay=(t.y-p.y)/d;}
  if(w.type==='bullet'){
    const n=w.spread||1;
    for(let i=0;i<n;i++){const sc=(i-(n-1)/2)*0.18,ang=Math.atan2(ay,ax)+sc;
      G.bullets.push({x:p.x,y:p.y,vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,dmg:w.dmg,rng:w.rng,traveled:0,color:w.color,piercing:w.piercing,hits:new Set(),r:5});}
  }else if(w.type==='shotgun'){
    const base=Math.atan2(ay,ax);
    for(let i=0;i<w.pellets;i++){const ang=base+(i/(w.pellets-1)-0.5)*w.sAngle*2;
      G.bullets.push({x:p.x,y:p.y,vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,dmg:w.dmg,rng:w.rng,traveled:0,color:w.color,piercing:false,hits:new Set(),r:5});}
  }else if(w.type==='grenade'){
    G.bullets.push({x:p.x,y:p.y,vx:ax*w.spd,vy:ay*w.spd,dmg:w.dmg,blastR:w.blastR,rng:w.rng,traveled:0,color:w.color,isGrenade:true,hits:new Set(),r:9});
  }else if(w.type==='homing'){
    for(let i=0;i<w.count;i++){const sc=(i-(w.count-1)/2)*0.4,ang=Math.atan2(ay,ax)+sc;
      G.bullets.push({x:p.x,y:p.y,vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,dmg:w.dmg,rng:w.rng,traveled:0,color:w.color,isHoming:true,trk:w.trk,hits:new Set(),r:6});}
  }else if(w.type==='laser'){
    w.laserTimer=0.18;w.laserAx=ax;w.laserAy=ay;
    const lw2=w.laserW||6;
    for(const e of G.enemies){const ex=e.x-p.x,ey=e.y-p.y,proj=ex*ax+ey*ay;
      if(proj>0&&proj<w.len&&Math.abs(ey*ax-ex*ay)<e.size+lw2)damageEnemy(e,w.dmg,true);}
  }else if(w.type==='freeze'){
    w.freezeTimer=0.4;
    for(const e of G.enemies){if(Math.hypot(e.x-p.x,e.y-p.y)<w.radius+e.size){
      if(w.shatter&&e.frozen>0)e.hp=0;else e.frozen=w.dur;damageEnemy(e,w.dmg,false);}}
  }
}
function updateWeapons(dt){
  const p=G.player;
  for(const w of p.weapons){
    w.timer-=dt;
    if(w.type==='flame'){
      const t=nearestEnemy(p.x,p.y,w.rng);
      if(t&&w.timer<=0){
        w.timer=1/w.rate;
        const d=Math.hypot(t.x-p.x,t.y-p.y)||1,ax=(t.x-p.x)/d,ay=(t.y-p.y)/d;
        for(const e of G.enemies){const ex=e.x-p.x,ey=e.y-p.y,proj=ex*ax+ey*ay;
          if(proj>0&&proj<w.rng&&Math.abs(ey*ax-ex*ay)<w.fWidth/2+e.size){
            damageEnemy(e,w.dmg,false);if(w.dot){e.burning=Math.max(e.burning,3);e.burnDmg=w.dmg*0.3;}}}
        for(let i=0;i<5;i++){const tp=rand(0.1,1);
          G.particles.push({x:p.x+ax*w.rng*tp+rand(-15,15),y:p.y+ay*w.rng*tp+rand(-15,15),vx:rand(-20,20),vy:rand(-40,0),life:rand(0.2,0.4),ml:0.4,color:w.color,r:rand(5,12)});}
      }
    }else if(w.timer<=0){w.timer=1/w.rate;fireWeapon(w,p);}
    if(w.laserTimer>0)w.laserTimer-=dt;
    if(w.freezeTimer>0)w.freezeTimer-=dt;
  }
}
function updateBullets(dt){
  const dead=new Set();
  for(let i=0;i<G.bullets.length;i++){
    const b=G.bullets[i];
    if(b.isHoming){
      const t=nearestEnemy(b.x,b.y,500);
      if(t){const d=Math.hypot(t.x-b.x,t.y-b.y)||1,tx=(t.x-b.x)/d,ty=(t.y-b.y)/d;
        const spd=Math.hypot(b.vx,b.vy)||1;
        const nx=lerp(b.vx/spd,tx,b.trk*dt),ny=lerp(b.vy/spd,ty,b.trk*dt);
        const ns=Math.hypot(nx,ny)||1;b.vx=(nx/ns)*spd;b.vy=(ny/ns)*spd;}
    }
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.traveled+=Math.hypot(b.vx*dt,b.vy*dt);
    if(b.traveled>b.rng){dead.add(i);continue;}
    for(const e of G.enemies){
      if(b.hits.has(e))continue;
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.size+b.r){
        b.hits.add(e);
        if(b.isGrenade){explode(b.x,b.y,b.blastR,b.dmg);dead.add(i);break;}
        damageEnemy(e,b.dmg,true);if(!b.piercing){dead.add(i);break;}
      }
    }
  }
  G.bullets=G.bullets.filter((_,i)=>!dead.has(i));
}
function explode(x,y,r,dmg){
  for(const e of G.enemies)if(Math.hypot(e.x-x,e.y-y)<r+e.size)damageEnemy(e,dmg,true);
  addParticles(x,y,'#f97316',14);
  G.particles.push({x,y,vx:0,vy:0,life:0.4,ml:0.4,color:'#fbbf24',r:r*0.7,ring:true});
}
function updateEBullets(dt){
  const p=G.player;
  G.eBullets=G.eBullets.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0)return false;
    if(Math.hypot(b.x-p.x,b.y-p.y)<14){damagePlayer(b.dmg);return false;}
    return true;
  });
}
function mkEnemy(id,x,y){
  const d=EDEFS[id]||EDEFS.zombie,scale=1+(G.time/60)*0.2;
  return{id,x,y,vx:0,vy:0,
    hp:Math.floor(d.hp*scale),maxHp:Math.floor(d.hp*scale),
    dmg:Math.floor(d.dmg*scale),spd:d.spd,size:d.size,color:d.color,name:d.n,
    xp:d.xp,tok:d.tok,tier:d.tier,boss:!!d.boss,ranged:!!d.ranged,
    sRange:d.sRange||0,sRate:d.sRate||2,shootTimer:0,knockback:!!d.knockback,
    frozen:0,burning:0,burnDmg:0,phase:1};
}
function spawnAround(id){
  const ang=Math.random()*Math.PI*2,sd=Math.max(W,H)*0.6+50;
  const x=clamp(G.player.x+Math.cos(ang)*sd,50,WORLD-50);
  const y=clamp(G.player.y+Math.sin(ang)*sd,50,WORLD-50);
  G.enemies.push(mkEnemy(id,x,y));
}
function killEnemy(e){
  G.kills++;G.player.tokens+=e.tok;
  const n=Math.max(1,Math.ceil(e.xp/5));
  for(let i=0;i<n;i++)G.xpOrbs.push({x:e.x+rand(-18,18),y:e.y+rand(-18,18),vx:rand(-60,60),vy:rand(-60,60),val:Math.ceil(e.xp/n)});
  addParticles(e.x,e.y,e.color,6);
  if(e.id==='zombieking')for(let i=0;i<3;i++)G.enemies.push(mkEnemy('zombie',e.x+rand(-50,50),e.y+rand(-50,50)));
}
function updateEnemies(dt){
  const p=G.player,dead=[];
  for(let i=0;i<G.enemies.length;i++){
    const e=G.enemies[i];
    if(e.hp<=0){killEnemy(e);dead.push(i);continue;}
    if(e.frozen>0)e.frozen-=dt;
    if(e.burning>0){e.burning-=dt;e.hp-=e.burnDmg*dt;}
    const fr=e.frozen>0?0.15:1;
    const dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy)||1;
    if(e.ranged&&d<e.sRange){
      if(d<e.sRange*0.65){e.vx=lerp(e.vx,-dx/d*e.spd*fr,5*dt);e.vy=lerp(e.vy,-dy/d*e.spd*fr,5*dt);}
      e.shootTimer-=dt;
      if(e.shootTimer<=0){e.shootTimer=1/e.sRate;G.eBullets.push({x:e.x,y:e.y,vx:dx/d*160,vy:dy/d*160,dmg:e.dmg,r:6,color:e.color,life:3});}
    }else{e.vx=lerp(e.vx,dx/d*e.spd*fr,8*dt);e.vy=lerp(e.vy,dy/d*e.spd*fr,8*dt);}
    e.x=clamp(e.x+e.vx*dt,20,WORLD-20);e.y=clamp(e.y+e.vy*dt,20,WORLD-20);
    if(d<e.size+14&&p.invincible<=0){
      damagePlayer(e.dmg);
      if(e.knockback){const nd=Math.hypot(p.x-e.x,p.y-e.y)||1;p.vx+=(p.x-e.x)/nd*280;p.vy+=(p.y-e.y)/nd*280;}
    }
    if(e.boss&&e.hp<e.maxHp*0.5&&e.phase===1){e.phase=2;e.spd*=1.3;addFloat('ENRAGED!',e.x,e.y-e.size-20,'#ef4444');}
  }
  for(let i=dead.length-1;i>=0;i--)G.enemies.splice(dead[i],1);
}
function gainXP(v){
  const p=G.player;p.xp+=v;
  if(p.xp>=xpNeeded(p.level)){p.xp-=xpNeeded(p.level);p.level++;
    addFloat('LEVEL UP!',p.x,p.y-55,'#facc15');G.phase='levelup';G.upgradeChoices=genUpgrades();}
}
function updateOrbs(dt){
  const p=G.player,dead=[];
  for(let i=0;i<G.xpOrbs.length;i++){
    const o=G.xpOrbs[i];o.vx*=0.88;o.vy*=0.88;
    const d=Math.hypot(o.x-p.x,o.y-p.y)||1;
    if(d<p.magnetRange){const pull=p.magnetSpeed+(1-d/p.magnetRange)*350;o.vx+=(p.x-o.x)/d*pull*dt;o.vy+=(p.y-o.y)/d*pull*dt;}
    o.x+=o.vx*dt;o.y+=o.vy*dt;
    if(d<18){gainXP(o.val);dead.push(i);}
  }
  for(let i=dead.length-1;i>=0;i--)G.xpOrbs.splice(dead[i],1);
}
function genUpgrades(){
  const p=G.player,opts=[];
  for(const w of p.weapons)if(w.ulv<WDEFS[w.id].ups.length)opts.push({type:'wup',w,name:WDEFS[w.id].ups[w.ulv],desc:w.name,color:w.color,icon:w.icon});
  for(const id of Object.keys(WDEFS))if(!p.weaponSet.has(id))opts.push({type:'neww',wid:id,name:WDEFS[id].name,desc:'New Weapon!',color:WDEFS[id].color,icon:WDEFS[id].icon});
  for(const id of Object.keys(PDEFS)){const lv=p.passiveLvl[id]||0;if(lv<PDEFS[id].ups.length)opts.push({type:'pass',pid:id,plv:lv,name:PDEFS[id].ups[lv],desc:PDEFS[id].name,color:PDEFS[id].color,icon:PDEFS[id].icon});}
  opts.sort(()=>Math.random()-0.5);return opts.slice(0,3);
}
function applyWUp(w,id,lv){
  if(id==='pistol'){if(lv===0)w.dmg*=1.5;else if(lv===1)w.rate*=1.5;else w.piercing=true;}
  else if(id==='machinegun'){if(lv===0)w.rate*=1.3;else if(lv===1)w.dmg*=1.4;else w.spread=3;}
  else if(id==='shotgun'){if(lv===0)w.dmg*=1.6;else if(lv===1)w.pellets+=2;else w.sAngle*=1.5;}
  else if(id==='laser'){if(lv===0)w.dmg*=1.5;else if(lv===1)w.rate*=1.3;else w.laserW=14;}

function applyPassive(p,id,lv){
  if(id==='shield'){if(lv===0){p.shieldMax++;p.shieldHp=p.shieldMax;}else p.shieldFast=true;}
  else if(id==='armor')p.armor=Math.min(p.armor+(lv===0?.2:lv===1?.3:.5),.85);
  else if(id==='magnet'){if(lv===0)p.magnetRange*=1.5;else p.magnetSpeed*=2;}
  else if(id==='speed')p.speed*=lv===0?1.3:lv===1?1.6:2;
  else if(id==='health'){const add=lv===0?50:100;p.maxHp+=add;p.hp=Math.min(p.hp+add,p.maxHp);}
  else if(id==='crit'){if(lv<2)p.critChance+=lv===0?.2:.4;else p.critMult=3;}
}
function applyUpgrade(ch){
  const p=G.player;

  else if(ch.type==='neww'){p.weapons.push(mkWeapon(ch.wid));p.weaponSet.add(ch.wid);}
  else if(ch.type==='pass'){applyPassive(p,ch.pid,ch.plv);p.passiveLvl[ch.pid]=(p.passiveLvl[ch.pid]||0)+1;}
  G.phase='playing';
}
function updatePlayer(dt){
  const p=G.player;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx-=1;if(keys['ArrowRight']||keys['KeyD'])dx+=1;
  if(keys['ArrowUp']||keys['KeyW'])dy-=1;if(keys['ArrowDown']||keys['KeyS'])dy+=1;
  if(touch.active){dx=touch.dx;dy=touch.dy;}
  if(dx!==0||dy!==0){const l=Math.hypot(dx,dy)||1;dx/=l;dy/=l;p.dir=dx<0?-1:1;}
  const t=nearestEnemy(p.x,p.y,600);
  if(t){const d=Math.hypot(t.x-p.x,t.y-p.y)||1;p.aimX=(t.x-p.x)/d;p.aimY=(t.y-p.y)/d;p.dir=t.x>p.x?1:-1;}
  p.vx=lerp(p.vx,dx*p.speed,12*dt);p.vy=lerp(p.vy,dy*p.speed,12*dt);
  p.x=clamp(p.x+p.vx*dt,20,WORLD-20);p.y=clamp(p.y+p.vy*dt,20,WORLD-20);
  if(p.invincible>0)p.invincible-=dt;
  if(p.shieldMax>0&&p.shieldHp<p.shieldMax){p.shieldTimer-=dt;if(p.shieldTimer<=0){p.shieldHp++;if(p.shieldHp<p.shieldMax)p.shieldTimer=p.shieldFast?3:5;}}
}
function updateSpawning(dt){
  G.spawnTimer-=dt;

    G.spawnTimer=Math.max(0.4,1.8-G.time*0.008);

    G.enemies.push(mkEnemy(bt,clamp(G.player.x+Math.cos(ang)*sd,50,WORLD-50),clamp(G.player.y+Math.sin(ang)*sd,50,WORLD-50)));

    ctx.fillStyle=ch.color;ctx.font='bold 11px monospace';ctx.fillText(ch.desc,cx+cw2/2,cy+64);
    ctx.fillStyle='#e2e8f0';wrapDraw(ch.name,cx+cw2/2,cy+84,cw2-16);
    ctx.fillStyle='#475569';ctx.font='11px monospace';ctx.fillText('[ '+(i+1)+' ]',cx+cw2/2,cy+162);
  }
  ctx.textAlign='left';
}
function drawStart(){
  ctx.fillStyle='#080812';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#181825';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.textAlign='center';
  ctx.shadowBlur=30;ctx.shadowColor='#c084fc';ctx.fillStyle='#c084fc';ctx.font='bold 58px monospace';ctx.fillText('PUMP',W/2,H/2-45);
  ctx.shadowColor='#fbbf24';ctx.fillStyle='#fbbf24';ctx.fillText('PIT',W/2,H/2+15);ctx.shadowBlur=0;
  ctx.fillStyle='#64748b';ctx.font='13px monospace';
  ctx.fillText('Survive endless waves — weapons auto-fire',W/2,H/2+58);
  ctx.fillText('WASD / Arrow Keys to move',W/2,H/2+78);
  ctx.fillStyle='#22c55e';ctx.font='bold 17px monospace';ctx.fillText('Press ENTER or SPACE to start',W/2,H/2+118);
  ctx.textAlign='left';
}
function drawDead(){
  ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#ef4444';ctx.font='bold 50px monospace';ctx.fillText('YOU DIED',W/2,H/2-90);
  const p=G.player;ctx.fillStyle='#94a3b8';ctx.font='16px monospace';
  ctx.fillText('Survived: '+Math.floor(G.time)+'s',W/2,H/2-40);
  ctx.fillText('Level: '+p.level,W/2,H/2-15);ctx.fillText('Kills: '+G.kills,W/2,H/2+12);
  ctx.fillText('$PUMP earned: '+p.tokens,W/2,H/2+40);
  ctx.fillStyle='#c084fc';ctx.font='bold 17px monospace';ctx.fillText('Press ENTER or SPACE to restart',W/2,H/2+90);
  ctx.textAlign='left';
}
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  ctx.clearRect(0,0,W,H);
  if(G.phase==='start')drawStart();
  else if(G.phase==='dead'){drawBG();drawDead();}
  else{if(G.phase==='playing')update(dt);draw();if(G.phase==='levelup')drawLevelUp();}
  requestAnimationFrame(loop);
}
window.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' '){if(G.phase==='start'||G.phase==='dead')initGame();return;}
  if(G.phase==='levelup'){const i=parseInt(e.key)-1;if(i>=0&&i<G.upgradeChoices.length)applyUpgrade(G.upgradeChoices[i]);}
});
c.addEventListener('click',e=>{
  if(G.phase==='start'||G.phase==='dead'){initGame();return;}
  if(G.phase!=='levelup')return;
  const rect=c.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
  const chs=G.upgradeChoices,cw2=Math.min(190,(W-60)/chs.length);
  const tot=chs.length*(cw2+14)-14,sx2=W/2-tot/2,cy=H/2-88;
  for(let i=0;i<chs.length;i++){const cx=sx2+i*(cw2+14);if(mx>=cx&&mx<=cx+cw2&&my>=cy&&my<=cy+178){applyUpgrade(chs[i]);break;}}
});
requestAnimationFrame(loop);
</script>
</body>
</html>
