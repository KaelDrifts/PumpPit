<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>⚔️ Dungeon Crawler — $PUMP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080814;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:16px 10px 40px}
#app{width:100%;max-width:480px}
button{transition:all .15s ease;cursor:pointer;font-family:inherit}
button:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px)}
button:active:not(:disabled){transform:translateY(0)}
button:disabled{cursor:not-allowed;opacity:.45}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}
.card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:8px}
.row{display:flex;gap:6px;margin-bottom:6px}
.stat-card{background:#1e293b;border-radius:8px;padding:6px 8px;text-align:center;flex:1;min-width:0}
.stat-icon{font-size:15px}
.stat-val{font-size:15px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat-lbl{font-size:9px;color:#64748b;letter-spacing:1px}
.hbar-wrap{margin-bottom:6px}
.hbar-top{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-bottom:2px}
.hbar-bg{background:#0f172a;border-radius:4px;height:14px;overflow:hidden;border:1px solid #1e293b}
.hbar-fill{height:100%;transition:width .4s ease;border-radius:4px}
.xp-bg{background:#0f172a;border-radius:4px;height:6px;overflow:hidden}
.xp-fill{height:100%;background:#facc15;border-radius:4px;transition:width .4s}
#log{background:#0f172a;border:1px solid #1e293b;border-radius:8px;height:148px;overflow-y:auto;padding:8px 10px;font-size:12px;font-family:monospace;display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.log-line{line-height:1.4}
.btn{border:none;border-radius:8px;padding:10px 14px;font-weight:bold;font-size:13px;flex:1;color:#fff}
.btn-red{background:#dc2626}
.btn-green{background:#16a34a}
.btn-brown{background:#78350f}
.btn-purple{background:#7c3aed}
.btn-yellow{background:#d97706}
.btn-gray{background:#475569}
.btn-blue{background:#1d4ed8}
.section-title{font-size:11px;color:#64748b;letter-spacing:1px;margin-bottom:4px}
.shop-row{display:flex;justify-content:space-between;align-items:center;background:#0f172a;border-radius:6px;padding:5px 8px;margin-bottom:4px}
.shop-btn{border:none;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:bold;color:#fff;cursor:pointer}
.equip-bar{background:#1e293b;border-radius:8px;padding:8px 12px;display:flex;gap:8px;border-top:2px solid #334155}
.equip-col{flex:1;min-width:0}
.equip-lbl{font-size:9px;color:#475569;letter-spacing:1px;margin-bottom:2px}
.equip-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.equip-stat{font-size:10px;color:#64748b}
.divider{width:1px;background:#334155}
.streak-bar{background:#1c1004;border:1px solid #92400e;border-radius:8px;padding:5px 12px;text-align:center;font-size:12px;color:#fbbf24;margin-bottom:8px}
.asc-banner{background:linear-gradient(135deg,#4c1d95,#2e1065);border:1px solid #7c3aed;border-radius:8px;padding:6px 12px;text-align:center;margin-bottom:8px;font-size:12px;color:#ddd6fe}
.zone-bar{background:#1e293b;border-radius:8px;padding:7px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.leaderboard{background:#1e293b;border-radius:8px;padding:10px 12px;margin-top:8px}
.lb-row{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-bottom:3px;border-bottom:1px solid #0f172a;padding-bottom:3px}
.asc-info{background:#1e293b;border-radius:8px;padding:8px 12px;margin-top:8px;border:1px solid #4c1d9544;font-size:11px;color:#64748b;line-height:1.7}
.float{position:fixed;top:35%;left:50%;transform:translateX(-50%);font-size:22px;font-weight:bold;pointer-events:none;z-index:999;animation:floatUp 1.2s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-70px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeIn{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div id="app"></div>
<script>
const ZONES=[
  {id:1,name:'🌲 Whispering Forest', color:'#16a34a',enemies:['rat','goblin','wolf'],   encPer:5},
  {id:2,name:'🏚️ Dark Dungeon',      color:'#a16207',enemies:['skeleton','orc','zombie'],encPer:5},
  {id:3,name:'🌋 Burning Cavern',    color:'#dc2626',enemies:['troll','demon','golem'],  encPer:5},
  {id:4,name:"🏔️ Dragon's Lair",    color:'#2563eb',enemies:['wyvern','lich','dragon'], encPer:5},
  {id:5,name:'👁️ Void Realm',       color:'#7c3aed',enemies:['shadow','phantom','elder'],encPer:5},
];
const ENEMIES={
  rat:    {name:'🐀 Giant Rat',      hp:12, atk:3, def:0, tokens:3,  gold:2,  tier:1,xp:5},
  goblin: {name:'👺 Goblin',         hp:20, atk:5, def:1, tokens:5,  gold:5,  tier:1,xp:8},
  wolf:   {name:'🐺 Dire Wolf',      hp:28, atk:8, def:2, tokens:8,  gold:7,  tier:1,xp:12},
  skeleton:{name:'💀 Skeleton',      hp:35, atk:10,def:3, tokens:15, gold:12, tier:2,xp:20},
  orc:    {name:'👹 Orc Warrior',    hp:50, atk:13,def:4, tokens:20, gold:18, tier:2,xp:28},
  zombie: {name:'🧟 Zombie',         hp:45, atk:11,def:5, tokens:18, gold:15, tier:2,xp:25},
  troll:  {name:'🧌 Cave Troll',     hp:80, atk:18,def:7, tokens:40, gold:35, tier:3,xp:50},
  demon:  {name:'😈 Fire Demon',     hp:70, atk:22,def:6, tokens:50, gold:40, tier:3,xp:60},
  golem:  {name:'🗿 Stone Golem',    hp:100,atk:15,def:12,tokens:45, gold:38, tier:3,xp:55},
  wyvern: {name:'🐉 Wyvern',         hp:120,atk:28,def:10,tokens:80, gold:70, tier:4,xp:90},
  lich:   {name:'☠️ Lich',           hp:110,atk:32,def:8, tokens:100,gold:85, tier:4,xp:110},
  dragon: {name:'🔥 Ancient Dragon', hp:200,atk:35,def:15,tokens:150,gold:130,tier:4,xp:180},
  shadow: {name:'🌑 Shadow Beast',   hp:150,atk:40,def:12,tokens:200,gold:170,tier:5,xp:220},
  phantom:{name:'👻 Void Phantom',   hp:140,atk:45,def:10,tokens:250,gold:200,tier:5,xp:260},
  elder:  {name:'🌀 Elder God',      hp:250,atk:50,def:20,tokens:500,gold:400,tier:5,xp:400},
};
const WEAPONS=[
  {id:'fists', name:'👊 Bare Fists',    atk:0, price:0},
  {id:'dagger',name:'🗡️ Rusty Dagger', atk:5, price:30},
  {id:'sword', name:'⚔️ Iron Sword',   atk:12,price:80},
  {id:'axe',   name:'🪓 Battle Axe',   atk:18,price:150},
  {id:'staff', name:'🪄 Magic Staff',  atk:25,price:250},
  {id:'scythe',name:'💀 Death Scythe', atk:40,price:500},
];
const ARMOR=[
  {id:'rags',   name:'🩱 Tattered Rags', def:0, price:0},
  {id:'leather',name:'🥻 Leather Armor', def:5, price:40},
  {id:'chain',  name:'⛓️ Chain Mail',    def:12,price:100},
  {id:'plate',  name:'🛡️ Plate Armor',   def:20,price:200},
  {id:'dragonS',name:'🐲 Dragon Scales', def:35,price:400},
];
const LOOT_BY_ZONE={
  1:{weapons:['dagger'],         armor:['leather'],         chance:.30},
  2:{weapons:['dagger','sword'], armor:['leather','chain'], chance:.35},
  3:{weapons:['sword','axe'],    armor:['chain','plate'],   chance:.40},
  4:{weapons:['axe','staff'],    armor:['plate','dragonS'], chance:.45},
  5:{weapons:['staff','scythe'], armor:['dragonS'],         chance:.50},
};
const LOG_COLORS={'p-atk':'#60a5fa','e-atk':'#f87171','heal':'#4ade80','loot':'#fbbf24','token':'#c084fc','sys':'#94a3b8','crit':'#f97316','lvl':'#facc15','asc':'#a78bfa'};

const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[rand(0,a.length-1)];
const clamp=(v,lo,hi)=>Math.min(Math.max(v,lo),hi);
const pAtk=p=>p.baseAtk+(p.weapon?p.weapon.atk:0);
const pDef=p=>p.baseDef+(p.armor?p.armor.def:0);
const dmg=(a,d)=>Math.max(1,a-d+rand(-2,4));
const tokMult=asc=>1+asc*0.2;
const SAVE='dungeonCrawlerV3';
const loadS=()=>{try{const d=localStorage.getItem(SAVE);return d?JSON.parse(d):null}catch{return null}};
const saveS=d=>{try{localStorage.setItem(SAVE,JSON.stringify(d))}catch{}};

function mkPlayer(asc){
  asc=asc||0;
  return{maxHp:100,hp:100,baseAtk:Math.floor(10*(1+asc*.1)),baseDef:Math.floor(5*(1+asc*.1)),
    weapon:WEAPONS[0],armor:ARMOR[0],potions:3,gold:0,tokens:0,kills:0,zone:1,encounter:0,xp:0,level:1};
}

var G={asc:0,bestTok:0,board:[],player:mkPlayer(0),enemy:null,phase:'explore',logs:[],busy:false,loot:null,streak:0};

function initFromSave(){
  var s=loadS();
  if(s){G.asc=s.asc||0;G.bestTok=s.bestTok||0;G.board=s.board||[];G.player=mkPlayer(G.asc);}
}

function persist(){saveS({asc:G.asc,bestTok:G.bestTok,board:G.board});}
function addLog(tx,t){if(!t)t='sys';G.logs=G.logs.slice(-60).concat([{tx:tx,t:t}]);renderLog();}

function addFloat(text,col){
  var el=document.createElement('div');
  el.className='float';el.textContent=text;
  el.style.color=col;el.style.textShadow='0 0 10px '+col;
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},1200);
}

function shakeEl(id){
  var el=document.getElementById(id);
  if(!el)return;
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(function(){el.classList.remove('shake');},350);
}

function spawnEnemy(){
  var z=ZONES[Math.min(G.player.zone-1,ZONES.length-1)];
  var key=pick(z.enemies);
  var base=ENEMIES[key];
  var scale=1+(G.player.zone-1)*.18+G.player.encounter*.06;
  G.enemy={name:base.name,key:key,tokens:base.tokens,gold:base.gold,tier:base.tier,xp:base.xp,
    hp:Math.floor(base.hp*scale),maxHp:Math.floor(base.hp*scale),
    atk:Math.floor(base.atk*scale),def:Math.floor(base.def*scale)};
  addLog('⚠️ '+G.enemy.name+' appears! HP:'+G.enemy.hp+' ATK:'+G.enemy.atk+' DEF:'+G.enemy.def,'sys');
  G.phase='combat';
  render();
}

function doAttack(){
  if(G.phase!=='combat'||G.busy||!G.enemy)return;
  G.busy=true;
  var isCrit=Math.random()<.15;
  var pdmg=dmg(pAtk(G.player),G.enemy.def);
  if(isCrit)pdmg=Math.floor(pdmg*1.8);
  shakeEl('enemy-display');
  if(isCrit){addLog('💥 CRIT! You smash '+G.enemy.name+' for '+pdmg+'!','crit');addFloat('💥 '+pdmg+'!','#f97316');}
  else{addLog('⚔️ You deal '+pdmg+' to '+G.enemy.name+'.','p-atk');addFloat('-'+pdmg,'#60a5fa');}
  G.enemy.hp-=pdmg;
  if(G.enemy.hp<=0){enemyKilled();}
  else{setTimeout(enemyAttacks,300);}
}

function enemyKilled(){
  var tm=tokMult(G.asc);
  var ndb=G.streak>=3?2.0:G.streak>=1?1.5:1.0;
  var earnT=Math.floor(G.enemy.tokens*tm*ndb);
  var earnG=G.enemy.gold;
  G.streak++;
  addLog('💀 '+G.enemy.name+' slain!','sys');
  addLog('🪙 +'+earnT+' $PUMP'+(ndb>1?' (x'+ndb+' no-dmg!)':'')+' | 💰 +'+earnG+'g','token');
  addFloat('🪙 +'+earnT,'#c084fc');
  var p=G.player;
  p.tokens+=earnT;p.gold+=earnG;p.kills++;p.xp+=G.enemy.xp;
  var newLvl=1+Math.floor(p.xp/80);
  if(newLvl>p.level){
    p.level=newLvl;
    p.baseAtk=Math.floor((10*(1+G.asc*.10))*(1+(newLvl-1)*.04));
    p.baseDef=Math.floor((5*(1+G.asc*.10))*(1+(newLvl-1)*.03));
    addLog('⭐ LEVEL UP! Now level '+newLvl+'!','lvl');
    addFloat('⭐ LVL UP!','#facc15');
  }
  var zn=ZONES[Math.min(p.zone-1,ZONES.length-1)];
  p.encounter++;
  if(p.encounter>=zn.encPer){
    p.zone=Math.min(p.zone+1,ZONES.length);
    p.encounter=0;
    addLog('🗺️ Advancing to '+ZONES[Math.min(p.zone-1,ZONES.length-1)].name+'!','sys');
  }
  var lz=LOOT_BY_ZONE[Math.min(p.zone,5)];
  var lootItem=null;
  if(Math.random()<lz.chance){
    var isW=Math.random()<.5;
    var itemId=pick(isW?lz.weapons:lz.armor);
    var item=isW?WEAPONS.filter(function(w){return w.id===itemId;})[0]:ARMOR.filter(function(a){return a.id===itemId;})[0];
    if(item){lootItem={id:item.id,name:item.name,atk:item.atk,def:item.def,price:item.price,isWeapon:isW};addLog('✨ Loot: '+item.name+'!','loot');}
  }
  G.enemy=null;G.loot=lootItem;
  var kills=p.kills;
  if(kills%5===0){setTimeout(function(){G.phase='shop';G.busy=false;render();},400);}
  else{setTimeout(function(){G.phase=lootItem?'loot':'explore';G.busy=false;render();},400);}
}

function enemyAttacks(){
  if(!G.enemy){G.busy=false;render();return;}
  var edm=dmg(G.enemy.atk,pDef(G.player));
  shakeEl('player-stats');
  addLog('🩸 '+G.enemy.name+' hits you for '+edm+'!','e-atk');
  addFloat('-'+edm,'#f87171');
  G.streak=0;G.player.hp-=edm;
  if(G.player.hp<=0){
    G.player.hp=0;
    addLog('💔 You were slain by '+G.enemy.name+'!','sys');
    addLog('📊 '+G.player.tokens+' $PUMP | '+G.player.kills+' kills | Zone '+G.player.zone,'sys');
    if(G.player.tokens>G.bestTok)G.bestTok=G.player.tokens;
    var entry={tokens:G.player.tokens,kills:G.player.kills,zone:G.player.zone,date:new Date().toLocaleDateString()};
    G.board=G.board.concat([entry]).sort(function(a,b){return b.tokens-a.tokens;}).slice(0,5);
    persist();
    setTimeout(function(){G.phase='dead';G.busy=false;render();},600);
  }else{G.busy=false;render();}
}

function doPotion(){
  if(G.player.potions<=0||G.busy)return;
  var h=Math.min(30,G.player.maxHp-G.player.hp);
  if(h===0){addLog('❤️ Already at full HP!','sys');return;}
  G.player.hp+=h;G.player.potions--;
  addLog('🧪 Potion: restored '+h+' HP!','heal');
  addFloat('+'+h+' HP','#4ade80');
  render();
}

function doRun(){
  if(G.phase!=='combat'||G.busy||!G.enemy)return;
  if(Math.random()<.45){
    addLog('🏃 You flee successfully!','sys');
    G.streak=0;G.enemy=null;G.phase='explore';render();
  }else{
    var edm=dmg(G.enemy.atk,pDef(G.player));
    addLog('❌ Failed to flee! '+G.enemy.name+' hits for '+edm+'!','e-atk');
    addFloat('-'+edm,'#f87171');
    G.streak=0;G.player.hp-=edm;
    if(G.player.hp<=0){G.player.hp=0;G.phase='dead';}
    render();
  }
}

function doLoot(take){
  if(!G.loot){G.phase='explore';render();return;}
  if(take){
    var l=G.loot;
    var better=l.isWeapon?l.atk>(G.player.weapon?G.player.weapon.atk:0):l.def>(G.player.armor?G.player.armor.def:0);
    if(better){
      if(l.isWeapon)G.player.weapon=l;else G.player.armor=l;
      addLog('✅ Equipped '+l.name+'!','loot');
    }else{
      var sv=Math.max(5,Math.floor((l.price||10)*.3));
      G.player.gold+=sv;
      addLog('💰 Sold '+l.name+' for '+sv+'g.','loot');
    }
  }else{addLog('🗑️ Discarded '+G.loot.name+'.','sys');}
  G.loot=null;G.phase='explore';render();
}

function doBuy(item,isW){
  if(G.player.gold<item.price){addLog('❌ Not enough gold!','sys');return;}
  G.player.gold-=item.price;
  if(isW)G.player.weapon=item;else G.player.armor=item;
  addLog('🛒 Bought '+item.name+'!','loot');
  addFloat(item.name+'!','#fbbf24');
  render();
}

function doBuyPotion(){
  if(G.player.gold<20){addLog('❌ Not enough gold!','sys');return;}
  G.player.gold-=20;G.player.potions++;
  addLog('🧪 Bought a Potion!','heal');render();
}

function doAscend(){
  if(G.player.zone<3){addLog('❌ Must reach Zone 3 to Ascend!','sys');return;}
  G.asc++;
  if(G.player.tokens>G.bestTok)G.bestTok=G.player.tokens;
  var entry={tokens:G.player.tokens,kills:G.player.kills,zone:G.player.zone,date:new Date().toLocaleDateString(),asc:true};
  G.board=G.board.concat([entry]).sort(function(a,b){return b.tokens-a.tokens;}).slice(0,5);
  persist();
  G.player=mkPlayer(G.asc);G.streak=0;G.enemy=null;G.loot=null;G.phase='explore';
  G.logs=[{tx:'✨ ASCENSION '+G.asc+'! +'+G.asc*10+'% ATK/DEF | +'+G.asc*20+'% $PUMP. New adventure!',t:'asc'}];
  render();
}

function doNewRun(){
  G.player=mkPlayer(G.asc);G.streak=0;G.enemy=null;G.loot=null;G.phase='explore';
  G.logs=[{tx:'⚔️ A new run begins! Good luck.',t:'sys'}];
  render();
}

function hpColor(cur,max){var p=(cur/max)*100;return p>60?'#22c55e':p>30?'#f59e0b':'#ef4444';}

function hbar(cur,max,label){
  var pct=clamp((cur/max)*100,0,100);
  var col=hpColor(cur,max);
  return '<div class="hbar-wrap"><div class="hbar-top"><span>'+label+'</span><span>'+cur+'/'+max+'</span></div>'+
    '<div class="hbar-bg"><div class="hbar-fill" style="width:'+pct+'%;background:'+col+';box-shadow:0 0 8px '+col+'88"></div></div></div>';
}

function statCard(lbl,val,icon,col){
  return '<div class="stat-card" style="border:1px solid '+col+'33">'+
    '<div class="stat-icon">'+icon+'</div>'+
    '<div class="stat-val" style="color:'+col+'">'+val+'</div>'+
    '<div class="stat-lbl">'+lbl+'</div></div>';
}

var _btnId=0;
function mkBtn(label,fn,cls,disabled){
  var id='b'+(++_btnId);
  setTimeout(function(){var el=document.getElementById(id);if(el&&!disabled)el.onclick=fn;},0);
  return '<button id="'+id+'" class="btn '+cls+'"'+(disabled?' disabled':'')+'>'+label+'</button>';
}

function mkShopBtn(label,fn,bg,disabled){
  var id='sb'+(++_btnId);
  setTimeout(function(){var el=document.getElementById(id);if(el&&!disabled)el.onclick=fn;},0);
  return '<button id="'+id+'" class="shop-btn" style="background:'+(disabled?'#1e293b':bg)+';color:'+(disabled?'#475569':'#fff')+'"'+(disabled?' disabled':'')+'>'+label+'</button>';
}

function renderLog(){
  var el=document.getElementById('log');
  if(!el)return;
  el.innerHTML=G.logs.map(function(l){
    return '<div class="log-line" style="color:'+(LOG_COLORS[l.t]||'#e2e8f0')+'">'+l.tx+'</div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function render(){
  var p=G.player;
  var zone=ZONES[Math.min(p.zone-1,ZONES.length-1)];
  var xpPct=Math.min(((p.xp%80)/80)*100,100);
  var canAscend=p.zone>=3;

  var html='<div style="text-align:center;margin-bottom:10px">'+
    '<h1 style="font-size:24px;font-weight:900;color:#c084fc;letter-spacing:2px;text-shadow:0 0 20px #c084fc88">⚔️ DUNGEON CRAWLER</h1>'+
    '<div style="font-size:11px;color:#475569">$PUMP Token Farming Roguelike</div></div>';

  if(G.asc>0)html+='<div class="asc-banner">✨ Ascension '+G.asc+' &nbsp;|&nbsp; +'+G.asc*10+'% ATK/DEF &nbsp;|&nbsp; +'+G.asc*20+'% Tokens</div>';

  html+='<div class="zone-bar" style="border-left:3px solid '+zone.color+'">'+
    '<span style="font-weight:bold;color:'+zone.color+';font-size:14px">'+zone.name+'</span>'+
    '<span style="color:#64748b;font-size:11px">Zone '+p.zone+' · '+p.encounter+'/'+zone.encPer+'</span></div>';

  html+='<div id="player-stats">'+
    '<div class="row">'+statCard('HP',p.hp+'/'+p.maxHp,'❤️','#ef4444')+statCard('ATK',pAtk(p),'⚔️','#f97316')+statCard('DEF',pDef(p),'🛡️','#3b82f6')+statCard('$PUMP',p.tokens,'🪙','#c084fc')+'</div>'+
    '<div class="row">'+statCard('LEVEL',p.level,'⭐','#facc15')+statCard('GOLD',p.gold,'💰','#a16207')+statCard('POTIONS',p.potions,'🧪','#4ade80')+statCard('KILLS',p.kills,'💀','#f87171')+'</div>'+
    '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:2px"><span>XP · Level '+p.level+'</span><span>'+(p.xp%80)+'/80 to next</span></div>'+
    '<div class="xp-bg"><div class="xp-fill" style="width:'+xpPct+'%"></div></div></div></div>';

  if(G.streak>0)html+='<div class="streak-bar">🔥 No-Damage Streak: '+G.streak+' kills!'+(G.streak>=3?' → 2× Token Bonus!':G.streak>=1?' → 1.5× Token Bonus!':'')+'</div>';

  if(G.phase==='combat'&&G.enemy){
    var e=G.enemy;
    html+='<div class="card fadeIn" style="border:1px solid #ef444444">'+
      '<div id="enemy-display" style="text-align:center;margin-bottom:8px">'+
      '<div style="font-size:32px;margin-bottom:2px">'+e.name.split(' ')[0]+'</div>'+
      '<div style="font-size:15px;font-weight:bold">'+e.name+'</div>'+
      '<div style="font-size:11px;color:#64748b;margin-top:2px">ATK:'+e.atk+' | DEF:'+e.def+' | Tier '+e.tier+'</div></div>'+
      hbar(e.hp,e.maxHp,'Enemy HP')+hbar(p.hp,p.maxHp,'Your HP')+
      '<div class="row" style="margin-top:10px">'+
      mkBtn('⚔️ Attack',doAttack,'btn-red',G.busy)+
      mkBtn('🧪 Potion ('+p.potions+')',doPotion,'btn-green',p.potions<=0||G.busy)+
      mkBtn('🏃 Run',doRun,'btn-brown',G.busy)+'</div></div>';
  }

  if(G.phase==='explore'){
    html+='<div class="card fadeIn" style="border:1px solid #33415566;text-align:center">'+
      '<div style="font-size:36px;margin-bottom:8px">🗺️</div>'+
      '<div style="color:#94a3b8;font-size:14px;margin-bottom:12px">You venture through '+zone.name+'…</div>'+
      '<div class="row" style="justify-content:center">'+
      mkBtn('⚔️ Search for Enemy',spawnEnemy,'btn-purple')+
      (canAscend?mkBtn('✨ Ascend!',doAscend,'btn-yellow'):'')+'</div>'+
      (canAscend?'<div style="font-size:11px;color:#a16207;margin-top:8px">Reached Zone 3! Ascend for permanent multipliers.</div>':'')+'</div>';
  }

  if(G.phase==='loot'&&G.loot){
    var l=G.loot;
    var better=l.isWeapon?l.atk>(p.weapon?p.weapon.atk:0):l.def>(p.armor?p.armor.def:0);
    var sv=Math.max(5,Math.floor((l.price||10)*.3));
    html+='<div class="card fadeIn" style="border:1px solid #fbbf2455;text-align:center">'+
      '<div style="font-size:22px;margin-bottom:4px">✨ LOOT DROP</div>'+
      '<div style="font-size:20px;margin-bottom:4px">'+l.name+'</div>'+
      '<div style="font-size:12px;color:#94a3b8;margin-bottom:12px">'+(l.isWeapon?'+'+l.atk+' ATK':'+'+l.def+' DEF')+
      '<span style="color:'+(better?'#4ade80':'#f87171')+'">'+(better?' ✅ Upgrade!',' ❌ Weaker than current')+'</span></div>'+
      '<div class="row">'+mkBtn(better?'✅ Equip Item':'💰 Sell ('+sv+'g)',function(){doLoot(true);},'btn-yellow')+
      mkBtn('🗑️ Discard',function(){doLoot(false);},'btn-gray')+'</div></div>';
  }

  if(G.phase==='shop'){
    var wRows='',aRows='';
    WEAPONS.filter(function(w){return w.id!=='fists';}).forEach(function(w){
      var eq=p.weapon&&p.weapon.id===w.id;
      var noG=p.gold<w.price;
      var wCopy=w;
      wRows+='<div class="shop-row"><div><span style="font-size:12px">'+w.name+'</span>'+
        '<span style="font-size:10px;color:#64748b;margin-left:6px">+'+w.atk+' ATK</span>'+
        (eq?'<span style="font-size:10px;color:#4ade80;margin-left:4px">✓</span>':'')+'</div>'+
        mkShopBtn(eq?'Equipped':w.price+'g',function(){doBuy(wCopy,true);},'#1d4ed8',noG||eq)+'</div>';
    });
    ARMOR.filter(function(a){return a.id!=='rags';}).forEach(function(a){
      var eq=p.armor&&p.armor.id===a.id;
      var noG=p.gold<a.price;
      var aCopy=a;
      aRows+='<div class="shop-row"><div><span style="font-size:12px">'+a.name+'</span>'+
        '<span style="font-size:10px;color:#64748b;margin-left:6px">+'+a.def+' DEF</span>'+
        (eq?'<span style="font-size:10px;color:#4ade80;margin-left:4px">✓</span>':'')+'</div>'+
        mkShopBtn(eq?'Equipped':a.price+'g',function(){doBuy(aCopy,false);},'#065f46',noG||eq)+'</div>';
    });
    html+='<div class="card fadeIn" style="border:1px solid #22c55e44">'+
      '<div style="font-size:18px;text-align:center;margin-bottom:6px">🛒 Wandering Merchant</div>'+
      '<div style="text-align:center;font-size:12px;color:#fbbf24;margin-bottom:10px">💰 Gold: '+p.gold+'</div>'+
      '<div class="section-title">⚔️ WEAPONS</div>'+wRows+
      '<div class="section-title" style="margin-top:8px">🛡️ ARMOR</div>'+aRows+
      '<div style="border-top:1px solid #1e293b;margin:8px 0 6px"></div>'+
      '<div class="shop-row"><span style="font-size:12px">🧪 Health Potion (+30 HP)</span>'+
      mkShopBtn('20g',doBuyPotion,'#16a34a',p.gold<20)+'</div>'+
      '<div style="margin-top:8px">'+mkBtn('🚪 Leave Shop',function(){G.phase='explore';render();},'btn-gray')+'</div></div>';
  }

  if(G.phase==='dead'){
    html+='<div class="card fadeIn" style="border:1px solid #ef444466;text-align:center">'+
      '<div style="font-size:48px;margin-bottom:6px">💀</div>'+
      '<div style="font-size:22px;color:#ef4444;font-weight:bold;margin-bottom:4px">YOU DIED</div>'+
      '<div style="color:#64748b;font-size:13px;margin-bottom:4px">Zone '+p.zone+' · '+p.kills+' kills · '+p.tokens+' $PUMP</div>'+
      (G.bestTok>0?'<div style="color:#fbbf24;font-size:12px;margin-bottom:10px">🏆 Personal Best: '+G.bestTok+' tokens</div>':'')+
      '<div class="row">'+mkBtn('🔄 New Run',doNewRun,'btn-purple')+
      (p.zone>=3?mkBtn('✨ Ascend First',doAscend,'btn-yellow'):'')+'</div></div>';
  }

  html+='<div id="log"></div>';

  html+='<div class="equip-bar">'+
    '<div class="equip-col"><div class="equip-lbl">WEAPON</div>'+
    '<div class="equip-name">'+(p.weapon?p.weapon.name:'👊 Bare Fists')+'</div>'+
    '<div class="equip-stat">+'+pAtk(p)+' total ATK</div></div>'+
    '<div class="divider"></div>'+
    '<div class="equip-col"><div class="equip-lbl">ARMOR</div>'+
    '<div class="equip-name">'+(p.armor?p.armor.name:'🩱 Tattered Rags')+'</div>'+
    '<div class="equip-stat">+'+pDef(p)+' total DEF</div></div></div>';

  if(G.board.length>0){
    var medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
    html+='<div class="leaderboard"><div style="font-size:13px;color:#fbbf24;font-weight:bold;margin-bottom:6px">🏆 Run History</div>'+
      G.board.map(function(e,i){
        return '<div class="lb-row"><span>'+(medals[i]||'·')+' Zone '+e.zone+(e.asc?' ✨':'')+' · '+e.kills+' kills · '+e.date+'</span>'+
          '<span style="color:#c084fc;font-weight:bold">'+e.tokens+' $PUMP</span></div>';
      }).join('')+'</div>';
  }

  html+='<div class="asc-info"><div style="color:#7c3aed;font-weight:bold;margin-bottom:4px">✨ Ascension System (Level '+G.asc+')</div>'+
    'Reach Zone 3 and Ascend for permanent bonuses:<br>'+
    '• +10% ATK &amp; DEF per ascension level<br>'+
    '• +20% $PUMP token earnings per ascension level<br>'+
    'Current: x'+(1+G.asc*.1).toFixed(1)+' ATK/DEF · x'+(1+G.asc*.2).toFixed(1)+' tokens</div>';

  document.getElementById('app').innerHTML=html;
  renderLog();
}

initFromSave();
G.logs=[{tx:'⚔️ Your adventure begins! Search for enemies.',t:'sys'}];
render();
</script>
</body>
</html>
